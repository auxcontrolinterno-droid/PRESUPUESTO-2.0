<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Banking PRO AI v10 Stable</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg1:#07111f;
--bg2:#0f172a;
--card:rgba(255,255,255,.06);
--line:rgba(255,255,255,.08);
--text:#fff;
--muted:#94a3b8;
--input:#fff;
--inputText:#111;
--primary:#2563eb;
--primary2:#1d4ed8;
}

body.light{
--bg1:#eef2ff;
--bg2:#ffffff;
--card:#ffffff;
--line:#e5e7eb;
--text:#111827;
--muted:#64748b;
--input:#ffffff;
--inputText:#111827;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:Inter,sans-serif;
background:linear-gradient(180deg,var(--bg1),var(--bg2));
color:var(--text);
padding:14px 14px 95px;
max-width:760px;
margin:auto;
}

.card,.header{
background:var(--card);
border:1px solid var(--line);
border-radius:22px;
padding:16px;
margin-bottom:12px;
backdrop-filter:blur(12px);
}

.big{font-size:34px;font-weight:800}
.small{font-size:12px;color:var(--muted)}
.title{font-size:17px;font-weight:800;margin-bottom:10px}

.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.kpi{
background:rgba(255,255,255,.04);
padding:12px;
border-radius:14px;
}

.kpi span{
display:block;
font-size:12px;
color:var(--muted);
margin-bottom:4px;
}

.kpi strong{font-size:18px}

input,select,button{
width:100%;
border:none;
outline:none;
border-radius:14px;
font-family:inherit;
}

input,select{
padding:14px;
background:var(--input);
color:var(--inputText);
font-weight:600;
margin-bottom:10px;
}

button{
padding:14px;
font-weight:800;
cursor:pointer;
}

.primary{
background:linear-gradient(135deg,var(--primary),var(--primary2));
color:#fff;
}

.secondary{
background:rgba(255,255,255,.08);
color:var(--text);
}

.tab{display:none}
.tab.active{display:block}

.list{
display:grid;
gap:10px;
}

.item{
background:rgba(255,255,255,.04);
padding:12px;
border-radius:14px;
border-left:4px solid transparent;
}

.ingreso{border-left-color:#22c55e}
.gasto{border-left-color:#ef4444}

.price{
font-weight:800;
margin-top:6px;
}

.small-btn{
padding:8px 10px;
font-size:12px;
margin-top:8px;
width:auto;
background:rgba(255,255,255,.08);
color:var(--text);
}

.progress{
height:10px;
background:rgba(255,255,255,.08);
border-radius:20px;
overflow:hidden;
margin-top:8px;
}

.bar{
height:100%;
background:linear-gradient(90deg,#22c55e,#84cc16);
width:0%;
transition:.3s;
}

.alert{
padding:10px;
border-radius:12px;
font-size:13px;
margin-top:8px;
line-height:1.4;
}

.good{background:rgba(34,197,94,.14);color:#22c55e}
.bad{background:rgba(239,68,68,.14);color:#ef4444}
.mid{background:rgba(245,158,11,.14);color:#f59e0b}

.nav{
position:fixed;
left:0;right:0;bottom:0;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
padding:10px 12px calc(10px + env(safe-area-inset-bottom));
background:rgba(5,10,20,.94);
backdrop-filter:blur(16px);
border-top:1px solid var(--line);
max-width:760px;
margin:auto;
}

.nav button{
padding:10px 6px;
font-size:11px;
background:transparent;
color:#cbd5e1;
}

.nav button.active{
background:rgba(255,255,255,.08);
color:#fff;
border-radius:12px;
}

canvas{
margin-top:10px;
background:rgba(255,255,255,.03);
padding:8px;
border-radius:14px;
}

.toast{
position:fixed;
left:50%;
bottom:88px;
transform:translateX(-50%);
background:#111827;
color:#fff;
padding:12px 16px;
border-radius:14px;
font-size:13px;
font-weight:700;
display:none;
z-index:999;
}

.eye{
font-size:12px;
margin-top:10px;
color:var(--muted);
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<div class="small">Banking PRO AI v10</div>
<div class="small" id="today"></div>

<div class="small" style="margin-top:10px">Saldo disponible</div>
<div class="big" id="saldoTop">$0</div>

<div class="eye" onclick="toggleHide()">👁 Mostrar / ocultar montos</div>

<div class="grid2" style="margin-top:12px">
<div class="kpi">
<span>Pendientes</span>
<strong id="pendingCount">0</strong>
</div>

<div class="kpi">
<span>Sincronizados</span>
<strong id="syncCount">0</strong>
</div>
</div>
</div>

<!-- HOME -->
<section class="tab active" id="tab-home">

<div class="card">
<div class="title">➕ Nuevo movimiento</div>

<input type="date" id="fecha">
<input type="text" id="descripcion" placeholder="Descripción">
<input type="text" id="monto" placeholder="Monto 4.000">

<select id="categoria">
<option>💰 Ingreso</option>
<option>🍔 Comida</option>
<option>🏠 Vivienda</option>
<option>🚗 Transporte</option>
<option>💡 Servicios</option>
<option>🎮 Entretenimiento</option>
<option>🏦 Ahorro</option>
</select>

<button class="primary" id="saveBtn" onclick="guardar()">💾 Guardar</button>
</div>

<div class="card">
<div class="title">🔔 Alertas</div>
<div id="alerts"></div>
</div>

</section>

<!-- DASH -->
<section class="tab" id="tab-dashboard">

<div class="card">
<div class="title">📊 Gastos por categoría</div>
<canvas id="chart1"></canvas>
</div>

<div class="card">
<div class="title">📈 Ingreso vs Gasto</div>
<canvas id="chart2"></canvas>
</div>

</section>

<!-- GOALS -->
<section class="tab" id="tab-goals">

<div class="card">
<div class="title">🎯 Nueva meta</div>

<input type="text" id="goalName" placeholder="Ej: Viaje">
<input type="number" id="goalValue" placeholder="Monto meta">

<button class="primary" onclick="addGoal()">Guardar meta</button>
</div>

<div class="card">
<div class="title">🚀 Metas</div>
<div id="goalList"></div>
</div>

</section>

<!-- LIST -->
<section class="tab" id="tab-list">

<div class="card">
<div class="title">📋 Movimientos</div>
<div class="list" id="lista"></div>
</div>

</section>

<!-- SETTINGS -->
<section class="tab" id="tab-settings">

<div class="card">
<div class="title">⚙️ Ajustes</div>

<button class="secondary" onclick="setTheme('dark')">🌙 Tema oscuro</button>
<br><br>
<button class="secondary" onclick="setTheme('light')">☀️ Tema claro</button>

</div>

</section>

<nav class="nav">
<button class="active" onclick="goTab('home',this)">🏠</button>
<button onclick="goTab('dashboard',this)">📊</button>
<button onclick="goTab('goals',this)">🎯</button>
<button onclick="goTab('list',this)">📋</button>
<button onclick="goTab('settings',this)">⚙️</button>
</nav>

<div class="toast" id="toast"></div>

<script>
const URL="https://script.google.com/macros/s/AKfycbwXGhRN-TJxXf4hvwk_BFV52Javiqn6Lzz5ps6M1yTz9PJy-9kDcsUKJLzUY-mTS1Z2/exec";

let data=[];
let hidden=localStorage.getItem("hideMoney")==="1";
let goals=JSON.parse(localStorage.getItem("goals")||"[]");
let pending=JSON.parse(localStorage.getItem("pendingQueue")||"[]");

let c1,c2;

fecha.valueAsDate=new Date();

today.innerText=new Date().toLocaleDateString("es-CO",{
weekday:"long",day:"numeric",month:"long"
});

pendingCount.innerText=pending.length;

load();
syncPending();

/* TOAST */
function toast(msg){
toastEl.innerText=msg;
toastEl.style.display="block";
setTimeout(()=>toastEl.style.display="none",2200);
}
const toastEl=document.getElementById("toast");

/* TABS */
function goTab(tab,btn){
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
document.getElementById("tab-"+tab).classList.add("active");
document.querySelectorAll(".nav button").forEach(x=>x.classList.remove("active"));
btn.classList.add("active");
}

/* MONEY */
function toggleHide(){
hidden=!hidden;
localStorage.setItem("hideMoney",hidden?"1":"0");
render();
}

function money(n){
if(hidden) return "••••••";
return "$"+Number(n).toLocaleString("es-CO");
}

/* THEME */
function setTheme(mode){
document.body.classList.toggle("light",mode==="light");
toast("Tema actualizado");
}

/* LOAD */
async function load(){
try{
let r=await fetch(URL+"?t="+Date.now());
data=await r.json();
syncCount.innerText=data.length;
render();
}catch(e){}
}

/* SAVE */
async function guardar(){

let datos={
Fecha:fecha.value,
Categoría:categoria.value,
Descripción:descripcion.value.trim(),
Monto:Number(monto.value.replace(/\./g,"")),
Tipo:categoria.value.includes("Ingreso")?"Ingreso":"Gasto"
};

if(!datos.Descripción || datos.Monto<=0){
toast("Completa datos");
return;
}

saveBtn.disabled=true;
saveBtn.innerText="Guardando...";

/* OFFLINE */
if(!navigator.onLine){

pending.push(datos);
localStorage.setItem("pendingQueue",JSON.stringify(pending));
pendingCount.innerText=pending.length;

descripcion.value="";
monto.value="";

toast("☁ Guardado offline");

saveBtn.disabled=false;
saveBtn.innerText="💾 Guardar";
return;
}

/* ONLINE */
try{

await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify(datos)
});

descripcion.value="";
monto.value="";

toast("✔ Guardado");
await load();

}catch(e){

pending.push(datos);
localStorage.setItem("pendingQueue",JSON.stringify(pending));
pendingCount.innerText=pending.length;

toast("☁ Guardado offline");
}

saveBtn.disabled=false;
saveBtn.innerText="💾 Guardar";
}

/* SYNC */
window.addEventListener("online",syncPending);

async function syncPending(){

if(!navigator.onLine) return;
if(!pending.length) return;

let enviados=0;

while(pending.length){

try{

await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify(pending[0])
});

pending.shift();
enviados++;

}catch(e){
break;
}
}

localStorage.setItem("pendingQueue",JSON.stringify(pending));
pendingCount.innerText=pending.length;

if(enviados){
toast("✔ "+enviados+" sincronizados");
load();
}
}

/* DELETE */
async function borrar(id){

if(!confirm("Eliminar movimiento")) return;

data=data.filter(x=>String(x.ID)!==String(id));
render();

try{
await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify({action:"delete",ID:id})
});
toast("Eliminado");
}catch(e){
toast("No se pudo eliminar");
}
}

/* GOALS */
function addGoal(){

let n=goalName.value.trim();
let v=Number(goalValue.value);

if(!n || v<=0) return;

goals.push({n,v});
localStorage.setItem("goals",JSON.stringify(goals));

goalName.value="";
goalValue.value="";

render();
toast("Meta creada");
}

/* RENDER */
function render(){

lista.innerHTML="";

let ing=0,gas=0,ah=0;
let cats={};

data.slice().reverse().forEach(x=>{

let m=Number(x.Monto)||0;

if(x.Tipo==="Ingreso") ing+=m;
else gas+=m;

if(String(x.Categoría).includes("Ahorro")) ah+=m;

if(x.Tipo==="Gasto"){
cats[x.Categoría]=(cats[x.Categoría]||0)+m;
}

lista.innerHTML+=`
<div class="item ${x.Tipo==="Ingreso"?"ingreso":"gasto"}">
<div>${x.Categoría} - ${x.Descripción}</div>
<div class="price">${money(m)}</div>
<button class="small-btn" onclick="borrar('${x.ID}')">🗑️</button>
</div>`;
});

saldoTop.innerText=money(ing-gas);

renderAlerts(ing,gas,ah,cats);
renderGoals(ah);
charts(ing,gas,cats);
}

/* ALERTS */
function renderAlerts(ing,gas,ah,cats){

let html="";

html+=gas>ing
?'<div class="alert bad">🔴 Gastas más de lo que ingresas</div>'
:'<div class="alert good">🟢 Balance positivo</div>';

let top=Object.entries(cats).sort((a,b)=>b[1]-a[1])[0];

if(top){
html+=`<div class="alert mid">⚠️ Mayor gasto: ${top[0]}</div>`;
}

html+=`<div class="alert good">🏦 Ahorro actual ${money(ah)}</div>`;

alerts.innerHTML=html;
}

/* GOAL LIST */
function renderGoals(ah){

goalList.innerHTML="";

goals.forEach((g,i)=>{

let p=Math.min((ah/g.v)*100,100);
let faltan=Math.max(g.v-ah,0);

goalList.innerHTML+=`
<div class="item">
<div><strong>${g.n}</strong></div>
<div class="small">${money(ah)} / ${money(g.v)}</div>
<div class="progress"><div class="bar" style="width:${p}%"></div></div>
<div class="small" style="margin-top:8px">
Faltan ${money(faltan)}
</div>
<button class="small-btn" onclick="delGoal(${i})">🗑️</button>
</div>`;
});
}

function delGoal(i){
goals.splice(i,1);
localStorage.setItem("goals",JSON.stringify(goals));
render();
}

/* CHARTS */
function charts(ing,gas,cats){

[c1,c2].forEach(x=>x&&x.destroy());

c1=new Chart(chart1,{
type:"doughnut",
data:{
labels:Object.keys(cats),
datasets:[{data:Object.values(cats)}]
}
});

c2=new Chart(chart2,{
type:"bar",
data:{
labels:["Ingresos","Gastos"],
datasets:[{data:[ing,gas]}]
}
});
}
</script>

</body>
</html>
