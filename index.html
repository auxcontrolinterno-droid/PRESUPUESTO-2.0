<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<title>Presupuesto PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{
font-family:'Inter',sans-serif;
background:radial-gradient(circle at top,#1a2a4a,#070b16);
color:#fff;
padding:14px;
}

h1{font-size:34px;font-weight:800;margin-bottom:4px;}
.sub{opacity:.7;margin-bottom:18px;font-size:13px;}

button,input,select{font-family:'Inter',sans-serif;}

.top{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:16px;}

.card{
background:rgba(255,255,255,.07);
backdrop-filter:blur(12px);
padding:18px;
border-radius:20px;
border:1px solid rgba(255,255,255,.08);
}

.card span{font-size:12px;opacity:.7;}
.card strong{font-size:26px;font-weight:800;}

.panel{
background:rgba(255,255,255,.06);
backdrop-filter:blur(14px);
padding:16px;
border-radius:26px;
border:1px solid rgba(255,255,255,.08);
}

form{display:grid;gap:12px;}

input,select,button{
width:100%;
padding:16px;
font-size:16px;
border:none;
outline:none;
border-radius:14px;
}

input,select{background:rgba(255,255,255,.95);color:#111;}

#monto{text-align:right;font-weight:700;font-size:18px;}

.row{display:grid;grid-template-columns:1fr;gap:12px;}

button{font-weight:800;cursor:pointer;}

.primary{background:linear-gradient(135deg,#0ea5e9,#2563eb);color:#fff;}
.secondary{background:rgba(255,255,255,.15);color:#fff;}

.list{display:grid;gap:10px;margin-top:18px;}

.item{
background:rgba(255,255,255,.06);
padding:14px;
border-radius:18px;
position:relative;
}

.item.ingreso::before,
.item.gasto::before{
content:"";
position:absolute;
left:0;top:0;bottom:0;width:4px;
}

.item.ingreso::before{background:#22c55e;}
.item.gasto::before{background:#ef4444;}

.item-title{font-weight:700;}
.price{font-weight:800;}

.delete{
margin-top:8px;
background:rgba(239,68,68,.2);
color:#fff;
padding:8px;
border-radius:10px;
font-size:12px;
}

#dashboard{display:none;}

.back{margin-bottom:12px;}

@media(min-width:700px){
.top{grid-template-columns:repeat(3,1fr);}
.row{grid-template-columns:1fr 1fr;}
}
</style>
</head>

<body>

<div id="app">

<h1>💸 Presupuesto PRO</h1>
<div class="sub">control inteligente de tus movimientos</div>

<button class="secondary" onclick="irDashboard()" style="margin-bottom:12px;">
📊 Ver Dashboard
</button>

<div class="top">
<div class="card"><span>Hoy gastado</span><strong id="hoy">$0</strong></div>
<div class="card"><span>Registros</span><strong id="registros">0</strong></div>
<div class="card"><span>Pendientes</span><strong id="pendientes">0</strong></div>
</div>

<div class="panel">

<form id="formulario">

<input type="date" id="fecha" required>
<input type="text" id="descripcion" placeholder="Descripción" required>

<div class="row">
<input type="text" id="monto" placeholder="Monto" required>

<select id="categoria">
<option>💰 Ingreso</option>
<option>🏠 Vivienda</option>
<option>🍔 Comida</option>
<option>🚗 Transporte</option>
<option>💡 Servicios</option>
<option>🎮 Entretenimiento</option>
<option>🏦 Ahorro</option>
</select>
</div>

<div class="row">
<button class="primary" type="submit">Guardar</button>
</div>

</form>

<div class="list" id="lista"></div>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<button class="secondary back" onclick="irApp()">⬅ Volver</button>

<div class="top">
<div class="card"><span>Ingresos</span><strong id="ingresos">$0</strong></div>
<div class="card"><span>Gastos</span><strong id="gastos">$0</strong></div>
<div class="card"><span>Balance</span><strong id="balance">$0</strong></div>
<div class="card"><span>Total mov.</span><strong id="totalMov">0</strong></div>
<div class="card"><span>Promedio gasto</span><strong id="promedio">$0</strong></div>
<div class="card"><span>Mayor gasto</span><strong id="mayor">$0</strong></div>
<div class="card"><span>Categoría top</span><strong id="topCat">-</strong></div>
</div>

</div>

<script>

const URL_SCRIPT="https://script.google.com/macros/s/AKfycbwXGhRN-TJxXf4hvwk_BFV52Javiqn6Lzz5ps6M1yTz9PJy-9kDcsUKJLzUY-mTS1Z2/exec";

let historial=[];

function irDashboard(){
document.getElementById("app").style.display="none";
document.getElementById("dashboard").style.display="block";
cargarDatos();
}

function irApp(){
document.getElementById("dashboard").style.display="none";
document.getElementById("app").style.display="block";
}

function money(n){
return "$"+Number(n).toLocaleString("es-CO");
}

async function cargarDatos(){
let r=await fetch(URL_SCRIPT);
historial=await r.json();
render();
renderDashboard();
}

function render(){

document.getElementById("registros").innerHTML=historial.length;

let lista=document.getElementById("lista");
lista.innerHTML="";

historial.slice().reverse().forEach((x,i)=>{

let indexReal = historial.length-1-i;
let tipo=x.Tipo==="Ingreso"?"ingreso":"gasto";
let signo=x.Tipo==="Ingreso"?"+":"-";

lista.innerHTML+=`
<div class="item ${tipo}">
<div class="item-title">${x.Categoría} - ${x.Descripción}</div>
<div class="price">${signo}${money(x.Monto)}</div>

<button class="delete" onclick="borrar(${indexReal})">🗑️ Borrar</button>
</div>
`;

});
}

function renderDashboard(){

let ingresos=0,gastos=0,totalGastos=0,max=0;
let categorias={};

historial.forEach(x=>{

categorias[x.Categoría]=(categorias[x.Categoría]||0)+1;

if(x.Tipo==="Ingreso") ingresos+=Number(x.Monto);
else{
gastos+=Number(x.Monto);
totalGastos+=Number(x.Monto);
if(Number(x.Monto)>max) max=Number(x.Monto);
}

});

let topCat=Object.keys(categorias).sort((a,b)=>categorias[b]-categorias[a])[0]||"-";

document.getElementById("ingresos").innerHTML=money(ingresos);
document.getElementById("gastos").innerHTML=money(gastos);
document.getElementById("balance").innerHTML=money(ingresos-gastos);
document.getElementById("totalMov").innerHTML=historial.length;
document.getElementById("mayor").innerHTML=money(max);
document.getElementById("topCat").innerHTML=topCat;

let prom = historial.length ? totalGastos / historial.length : 0;
document.getElementById("promedio").innerHTML=money(prom);

}

async function enviar(datos){
return await fetch(URL_SCRIPT,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify(datos)
});
}

async function borrar(index){

await fetch(URL_SCRIPT,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify({action:"delete",index:index})
});

await cargarDatos();
}

async function guardar(){

let fecha=document.getElementById("fecha").value;
let descripcion=document.getElementById("descripcion").value.trim();
let monto=Number(document.getElementById("monto").value.replace(/\./g,""));
let categoria=document.getElementById("categoria").value;

if(!descripcion || monto<=0){
alert("Datos inválidos");
return;
}

let tipo=categoria.includes("Ingreso")?"Ingreso":"Gasto";
let f=new Date(fecha);

let datos={
Fecha:fecha,
Categoría:categoria,
Descripción:descripcion,
Monto:monto,
Tipo:tipo,
Mes:f.getMonth()+1,
Año:f.getFullYear()
};

await enviar(datos);
await cargarDatos();

document.getElementById("descripcion").value="";
document.getElementById("monto").value="";
}

document.getElementById("formulario").addEventListener("submit",e=>{
e.preventDefault();
guardar();
});

document.getElementById("fecha").valueAsDate=new Date();
cargarDatos();

</script>

</body>
</html>
