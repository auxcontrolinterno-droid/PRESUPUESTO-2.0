<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<title>Presupuesto PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:'Inter',sans-serif;
background:radial-gradient(circle at top,#1a2a4a,#070b16);
color:#fff;
padding:14px;
}

h1{font-size:34px;font-weight:800;margin-bottom:4px;}
.sub{opacity:.7;margin-bottom:18px;font-size:13px;}

button,input,select{
font-family:'Inter',sans-serif;
}

.top{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:16px;}

.card{
background:rgba(255,255,255,.07);
backdrop-filter:blur(12px);
padding:18px;
border-radius:20px;
border:1px solid rgba(255,255,255,.08);
}

.card span{font-size:12px;opacity:.7;}
.card strong{font-size:26px;font-weight:800;}

.panel{
background:rgba(255,255,255,.06);
backdrop-filter:blur(14px);
padding:16px;
border-radius:26px;
border:1px solid rgba(255,255,255,.08);
}

form{display:grid;gap:12px;}

input,select,button{
width:100%;
padding:16px;
font-size:16px;
border:none;
outline:none;
border-radius:14px;
}

input,select{
background:rgba(255,255,255,.95);
color:#111;
}

#monto{text-align:right;font-weight:700;font-size:18px;}

.row{display:grid;grid-template-columns:1fr;gap:12px;}

button{font-weight:800;cursor:pointer;}

.primary{
background:linear-gradient(135deg,#0ea5e9,#2563eb);
color:#fff;
}

.secondary{
background:rgba(255,255,255,.15);
color:#fff;
}

.list{display:grid;gap:10px;margin-top:18px;}

.item{
background:rgba(255,255,255,.06);
padding:14px;
border-radius:18px;
position:relative;
}

.item.ingreso::before,
.item.gasto::before{
content:"";
position:absolute;
left:0;top:0;bottom:0;width:4px;
}

.item.ingreso::before{background:#22c55e;}
.item.gasto::before{background:#ef4444;}

.item-title{font-weight:700;}
.price{font-weight:800;}

#dashboard{display:none;}

.back{margin-bottom:12px;}

@media(min-width:700px){
.top{grid-template-columns:repeat(3,1fr);}
.row{grid-template-columns:1fr 1fr;}
}
</style>
</head>

<body>

<!-- ================= APP ================= -->
<div id="app">

<h1>💸 Presupuesto PRO</h1>
<div class="sub">control inteligente de tus movimientos</div>

<button class="secondary" onclick="irDashboard()" style="margin-bottom:12px;">
📊 Ver Dashboard
</button>

<div class="top">
<div class="card">
<span>Hoy gastado</span>
<strong id="hoy">$0</strong>
</div>

<div class="card">
<span>Registros</span>
<strong id="registros">0</strong>
</div>

<div class="card">
<span>Pendientes</span>
<strong id="pendientes">0</strong>
</div>
</div>

<div class="panel">

<form id="formulario">

<input type="date" id="fecha" required>
<input type="text" id="descripcion" placeholder="Descripción" required>

<div class="row">
<input type="text" id="monto" placeholder="Monto" required>

<select id="categoria">
<option>💰 Ingreso</option>
<option>🏠 Vivienda</option>
<option>🍔 Comida</option>
<option>🚗 Transporte</option>
<option>💡 Servicios</option>
<option>🎮 Entretenimiento</option>
<option>🏦 Ahorro</option>
</select>
</div>

<div class="row">
<button class="primary" type="submit">Guardar</button>
<button class="secondary" type="button" onclick="guardarSeguir()">Guardar y seguir</button>
</div>

</form>

<div class="list" id="lista"></div>

</div>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard">

<button class="secondary back" onclick="irApp()">⬅ Volver</button>

<div class="top">
<div class="card"><span>Ingresos</span><strong id="ingresos">$0</strong></div>
<div class="card"><span>Gastos</span><strong id="gastos">$0</strong></div>
<div class="card"><span>Balance</span><strong id="balance">$0</strong></div>
</div>

<canvas id="chart"></canvas>

</div>

<script>

const URL_SCRIPT="https://script.google.com/macros/s/AKfycbwXGhRN-TJxXf4hvwk_BFV52Javiqn6Lzz5ps6M1yTz9PJy-9kDcsUKJLzUY-mTS1Z2/exec";

let historial=[];

/* ================= NAV ================= */
function irDashboard(){
document.getElementById("app").style.display="none";
document.getElementById("dashboard").style.display="block";
cargarDatos();
}

function irApp(){
document.getElementById("dashboard").style.display="none";
document.getElementById("app").style.display="block";
}

/* ================= HELPERS ================= */
function money(n){
return "$"+Number(n).toLocaleString("es-CO");
}

/* ================= FETCH DATA ================= */
async function cargarDatos(){
let r=await fetch(URL_SCRIPT);
historial=await r.json();
render();
renderDashboard();
}

/* ================= RENDER APP ================= */
function render(){

document.getElementById("registros").innerHTML=historial.length;

let lista=document.getElementById("lista");
lista.innerHTML="";

historial.slice().reverse().forEach(x=>{

let tipo=x.Tipo==="Ingreso"?"ingreso":"gasto";
let signo=x.Tipo==="Ingreso"?"+":"-";

lista.innerHTML+=`
<div class="item ${tipo}">
<div class="item-title">${x.Categoría} - ${x.Descripción}</div>
<div class="price">${signo}${money(x.Monto)}</div>
</div>
`;

});
}

/* ================= DASHBOARD ================= */
function renderDashboard(){

let ingresos=0;
let gastos=0;

historial.forEach(x=>{
if(x.Tipo==="Ingreso") ingresos+=Number(x.Monto);
else gastos+=Number(x.Monto);
});

document.getElementById("ingresos").innerHTML=money(ingresos);
document.getElementById("gastos").innerHTML=money(gastos);
document.getElementById("balance").innerHTML=money(ingresos-gastos);

}

/* ================= SEND ================= */
async function enviar(datos){
return await fetch(URL_SCRIPT,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify(datos)
});
}

/* ================= SAVE ================= */
async function guardar(){

let fecha=document.getElementById("fecha").value;
let descripcion=document.getElementById("descripcion").value.trim();
let monto=Number(document.getElementById("monto").value.replace(/\./g,""));
let categoria=document.getElementById("categoria").value;

if(!descripcion || monto<=0){
alert("Datos inválidos");
return;
}

let tipo=categoria.includes("Ingreso")?"Ingreso":"Gasto";
let f=new Date(fecha);

let datos={
Fecha:fecha,
Categoría:categoria,
Descripción:descripcion,
Monto:monto,
Tipo:tipo,
Mes:f.getMonth()+1,
Año:f.getFullYear()
};

await enviar(datos);

await cargarDatos();

document.getElementById("descripcion").value="";
document.getElementById("monto").value="";
}

/* ================= FORM ================= */
document.getElementById("formulario").addEventListener("submit",e=>{
e.preventDefault();
guardar();
});

/* ================= INIT ================= */
document.getElementById("fecha").valueAsDate=new Date();
cargarDatos();

</script>

</body>
</html>
