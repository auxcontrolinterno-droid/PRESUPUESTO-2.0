<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Presupuesto PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Inter',sans-serif;
background:radial-gradient(circle at top,#1a2a4a,#070b16);
color:#fff;
padding:14px;
}

/* NAV */
.nav{
display:flex;
gap:10px;
margin-bottom:14px;
}
.nav button{
flex:1;
padding:12px;
border-radius:12px;
font-weight:800;
background:rgba(255,255,255,.1);
color:#fff;
border:none;
}
.nav .active{
background:#2563eb;
}

/* VISTAS */
.view{display:none}
.view.active{display:block}

/* FORM */
input,select,button{
width:100%;
padding:14px;
border-radius:12px;
border:none;
margin-bottom:10px;
font-size:15px;
}

/* BOTONES */
.primary{
background:#2563eb;
color:#fff;
font-weight:800;
}

.secondary{
background:rgba(255,255,255,.15);
color:#fff;
}

/* LISTA */
.item{
background:rgba(255,255,255,.08);
padding:12px;
border-radius:14px;
margin-top:10px;
}

.ingreso{border-left:4px solid #22c55e}
.gasto{border-left:4px solid #ef4444}

.price.ingreso{color:#22c55e}
.price.gasto{color:#ef4444}

/* DASHBOARD */
.card{
background:rgba(255,255,255,.08);
padding:14px;
border-radius:14px;
margin-bottom:10px;
}

canvas{background:white;border-radius:12px;padding:10px}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<button id="btnForm" class="active" onclick="show('form')">💸 Movimientos</button>
<button id="btnDash" onclick="show('dash')">📊 Dashboard</button>
</div>

<!-- FORM -->
<div id="form" class="view active">

<input type="date" id="fecha">
<input type="text" id="descripcion" placeholder="Descripción">
<input type="text" id="monto" placeholder="Monto">

<select id="categoria">
<option>Ingreso</option>
<option>Gasto</option>
</select>

<button class="primary" onclick="guardar()">Guardar</button>

<div id="lista"></div>
</div>

<!-- DASHBOARD -->
<div id="dash" class="view">

<div class="card">
<h3>Resumen</h3>
<div id="resumen"></div>
</div>

<canvas id="chart"></canvas>

</div>

<script>

const URL="TU_SCRIPT_URL";

let data=[];

/* CAMBIO DE VISTAS */
function show(v){

document.querySelectorAll(".view").forEach(x=>x.classList.remove("active"));
document.querySelectorAll(".nav button").forEach(x=>x.classList.remove("active"));

document.getElementById(v).classList.add("active");

if(v==="form") document.getElementById("btnForm").classList.add("active");
if(v==="dash"){
document.getElementById("btnDash").classList.add("active");
renderDash();
}

}

/* CARGAR */
async function load(){
let r=await fetch(URL);
data=await r.json();
renderList();
}

/* GUARDAR */
async function guardar(){

let obj={
Fecha:document.getElementById("fecha").value,
Descripción:document.getElementById("descripcion").value,
Monto:Number(document.getElementById("monto").value),
Tipo:document.getElementById("categoria").value
};

await fetch(URL,{
method:"POST",
body:JSON.stringify(obj)
});

load();
}

/* LISTA */
function renderList(){

let html="";

data.slice().reverse().forEach(x=>{

let cls=x.Tipo==="Ingreso"?"ingreso":"gasto";
let sign=x.Tipo==="Ingreso"?"+":"-";

html+=`
<div class="item ${cls}">
<strong>${x.Descripción}</strong><br>
<small>${x.Fecha}</small><br>
<div class="price ${cls}">${sign}$${x.Monto}</div>
</div>
`;
});

document.getElementById("lista").innerHTML=html;

}

/* DASHBOARD */
function renderDash(){

let i=0,g=0;

data.forEach(x=>{
if(x.Tipo==="Ingreso") i+=Number(x.Monto);
else g+=Number(x.Monto);
});

document.getElementById("resumen").innerHTML=`
Ingresos: $${i}<br>
Gastos: $${g}<br>
Balance: $${i-g}
`;

new Chart(document.getElementById("chart"),{
type:"doughnut",
data:{
labels:["Ingresos","Gastos"],
datasets:[{data:[i,g]}]
}
});

}

load();

</script>

</body>
</html>
