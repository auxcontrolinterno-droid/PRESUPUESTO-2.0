<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<title>Presupuesto PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{
font-family:'Inter',sans-serif;
background:radial-gradient(circle at top,#1a2a4a,#070b16);
color:#fff;
padding:14px;
}

h1{font-size:32px;font-weight:800;margin-bottom:4px;}
.sub{opacity:.7;margin-bottom:18px;font-size:13px;}

button,input,select{font-family:'Inter',sans-serif;}

.top{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:16px;}

.card{
background:rgba(255,255,255,.07);
backdrop-filter:blur(12px);
padding:18px;
border-radius:20px;
border:1px solid rgba(255,255,255,.08);
}

.card span{font-size:12px;opacity:.7;}
.card strong{font-size:26px;font-weight:800;}

.panel{
background:rgba(255,255,255,.06);
backdrop-filter:blur(14px);
padding:16px;
border-radius:26px;
border:1px solid rgba(255,255,255,.08);
}

form{display:grid;gap:12px;}

input,select,button{
width:100%;
padding:16px;
font-size:16px;
border:none;
outline:none;
border-radius:14px;
}

input,select{background:rgba(255,255,255,.95);color:#111;}

#monto{text-align:right;font-weight:700;font-size:18px;}

.row{display:grid;grid-template-columns:1fr;gap:12px;}

button{font-weight:800;cursor:pointer;}

.primary{background:linear-gradient(135deg,#0ea5e9,#2563eb);color:#fff;}
.secondary{background:rgba(255,255,255,.15);color:#fff;}

.list{display:grid;gap:10px;margin-top:18px;}

.item{
background:rgba(255,255,255,.06);
padding:14px;
border-radius:18px;
position:relative;
}

.item.ingreso::before,
.item.gasto::before{
content:"";
position:absolute;
left:0;top:0;bottom:0;width:4px;
}

.item.ingreso::before{background:#22c55e;}
.item.gasto::before{background:#ef4444;}

.item-title{font-weight:700;}
.price{font-weight:800;margin-top:4px;}

.delete{
margin-top:10px;
background:rgba(239,68,68,.2);
color:#fff;
padding:8px;
border-radius:10px;
font-size:12px;
}

#dashboard{display:none;}

.back{margin-bottom:12px;}

/* TOAST */
.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
padding:12px 18px;
border-radius:12px;
font-weight:700;
z-index:9999;
color:#fff;
}

@media(min-width:700px){
.top{grid-template-columns:repeat(3,1fr);}
.row{grid-template-columns:1fr 1fr;}
}
</style>
</head>

<body>

<!-- APP -->
<div id="app">

<h1>💸 Presupuesto PRO</h1>
<div class="sub">control simple y rápido de tus movimientos</div>

<button class="secondary" onclick="irDashboard()" style="margin-bottom:12px;">
📊 Ver Dashboard
</button>

<div class="top">
<div class="card"><span>Hoy</span><strong id="hoy">$0</strong></div>
<div class="card"><span>Registros</span><strong id="registros">0</strong></div>
<div class="card"><span>Pendientes</span><strong id="pendientes">0</strong></div>
</div>

<div class="panel">

<form id="formulario">

<input type="date" id="fecha" required>
<input type="text" id="descripcion" placeholder="Descripción" required>

<div class="row">
<input type="text" id="monto" placeholder="Monto" required>

<select id="categoria">
<option>💰 Ingreso</option>
<option>🏠 Vivienda</option>
<option>🍔 Comida</option>
<option>🚗 Transporte</option>
<option>💡 Servicios</option>
<option>🎮 Entretenimiento</option>
<option>🏦 Ahorro</option>
</select>
</div>

<button class="primary" type="submit">Guardar</button>

</form>

<div class="list" id="lista"></div>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<button class="secondary back" onclick="irApp()">⬅ Volver</button>

<div class="top">
<div class="card"><span>Ingresos</span><strong id="ingresos">$0</strong></div>
<div class="card"><span>Gastos</span><strong id="gastos">$0</strong></div>
<div class="card"><span>Balance</span><strong id="balance">$0</strong></div>
</div>

</div>

<script>

const URL_SCRIPT="https://script.google.com/macros/s/AKfycbwXGhRN-TJxXf4hvwk_BFV52Javiqn6Lzz5ps6M1yTz9PJy-9kDcsUKJLzUY-mTS1Z2/exec";

let historial=[];

/* NAV */
function irDashboard(){
document.getElementById("app").style.display="none";
document.getElementById("dashboard").style.display="block";
cargarDatos();
}

function irApp(){
document.getElementById("dashboard").style.display="none";
document.getElementById("app").style.display="block";
}

/* MONEY */
function money(n){
return "$"+Number(n).toLocaleString("es-CO");
}

/* TOAST */
function toast(msg,color="#22c55e"){
let t=document.createElement("div");
t.className="toast";
t.innerText=msg;
t.style.background=color;
document.body.appendChild(t);
setTimeout(()=>t.remove(),2000);
}

/* LOAD */
async function cargarDatos(){
let r=await fetch(URL_SCRIPT);
historial=await r.json();
render();
renderDashboard();
}

/* RENDER LIST */
function render(){

document.getElementById("registros").innerText=historial.length;

let lista=document.getElementById("lista");
lista.innerHTML="";

historial.slice().reverse().forEach(x=>{

let tipo=x.Tipo==="Ingreso"?"ingreso":"gasto";
let signo=x.Tipo==="Ingreso"?"+":"-";

lista.innerHTML+=`
<div class="item ${tipo}">
<div class="item-title">${x.Categoría} - ${x.Descripción}</div>
<div class="price">${signo}${money(x.Monto)}</div>

<button class="delete" onclick="borrar('${x.ID}')">🗑️ Borrar</button>
</div>
`;
});
}

/* DASHBOARD SIMPLE */
function renderDashboard(){

let ingresos=0,gastos=0;

historial.forEach(x=>{
if(x.Tipo==="Ingreso") ingresos+=Number(x.Monto);
else gastos+=Number(x.Monto);
});

document.getElementById("ingresos").innerText=money(ingresos);
document.getElementById("gastos").innerText=money(gastos);
document.getElementById("balance").innerText=money(ingresos-gastos);
}

/* SEND */
async function enviar(data){
return await fetch(URL_SCRIPT,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify(data)
});
}

/* DELETE */
async function borrar(id){

if(!confirm("¿Eliminar este movimiento?")) return;

let r=await fetch(URL_SCRIPT,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify({action:"delete",ID:id})
});

let res=await r.json();

if(res.status==="deleted"){
toast("Eliminado ✔️","#ef4444");
}else{
toast("Error al eliminar","#ef4444");
}

await cargarDatos();
}

/* SAVE */
document.getElementById("formulario").addEventListener("submit",async e=>{
e.preventDefault();

let fecha=document.getElementById("fecha").value;
let descripcion=document.getElementById("descripcion").value.trim();
let monto=Number(document.getElementById("monto").value);
let categoria=document.getElementById("categoria").value;

if(!descripcion || monto<=0){
toast("Datos inválidos","#ef4444");
return;
}

let tipo=categoria.includes("Ingreso")?"Ingreso":"Gasto";

let r=await enviar({
Fecha:fecha,
Categoría:categoria,
Descripción:descripcion,
Monto:monto,
Tipo:tipo
});

let res=await r.json();

if(res.status==="ok"){
toast("Guardado ✔️");
}else{
toast("Error al guardar","#ef4444");
}

document.getElementById("descripcion").value="";
document.getElementById("monto").value="";

await cargarDatos();
});

/* INIT */
document.getElementById("fecha").valueAsDate=new Date();
cargarDatos();

</script>

</body>
</html>
