<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Banking PRO AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
font-family:Inter,sans-serif;
background:linear-gradient(180deg,#070b16,#0b1020);
color:#fff;
padding:14px 14px 90px;
max-width:760px;
margin:auto;
}
.header,.card{
background:rgba(255,255,255,.06);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,.08);
border-radius:22px;
padding:16px;
margin-bottom:12px;
}
.header{
background:linear-gradient(135deg,#111827,#1e293b);
}
.small{font-size:12px;opacity:.72}
.big{font-size:32px;font-weight:800;margin-top:4px}

.statusbar{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
margin-top:12px;
}
.pill{
background:rgba(255,255,255,.06);
padding:10px;
border-radius:14px;
font-size:11px;
text-align:center;
}
.pill strong{
display:block;
font-size:14px;
margin-top:4px;
}

.title{
font-size:17px;
font-weight:800;
margin-bottom:10px;
}

.field{margin-bottom:10px}
.field label{
display:block;
font-size:12px;
opacity:.72;
margin-bottom:5px;
}

input,select,button{
width:100%;
border:none;
outline:none;
border-radius:14px;
font-family:inherit;
}

input,select{
padding:14px;
background:#fff;
color:#111;
font-size:14px;
font-weight:600;
}

button{
padding:14px;
font-size:15px;
font-weight:800;
cursor:pointer;
}

.primary{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:#fff;
}

.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.kpi{
background:rgba(255,255,255,.05);
padding:12px;
border-radius:14px;
}

.kpi span{
display:block;
font-size:12px;
opacity:.72;
margin-bottom:4px;
}

.kpi strong{
font-size:18px;
}

.list{
display:grid;
gap:10px;
}

.item{
background:rgba(255,255,255,.05);
padding:12px;
border-radius:14px;
border-left:4px solid transparent;
}

.ingreso{border-left-color:#22c55e}
.gasto{border-left-color:#ef4444}

.price{
font-weight:800;
margin-top:6px;
}

.small-btn{
margin-top:8px;
padding:8px 10px;
font-size:12px;
width:auto;
background:rgba(255,255,255,.08);
color:#fff;
}

.alert{
padding:10px;
border-radius:12px;
font-size:13px;
margin-top:8px;
line-height:1.4;
}

.good{background:rgba(34,197,94,.14);color:#22c55e}
.mid{background:rgba(245,158,11,.14);color:#f59e0b}
.bad{background:rgba(239,68,68,.14);color:#ef4444}

canvas{
margin-top:10px;
background:rgba(255,255,255,.03);
border-radius:14px;
padding:10px;
}

.tab{display:none}
.tab.active{display:block}

.nav{
position:fixed;
left:0;right:0;bottom:0;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
padding:10px 12px calc(10px + env(safe-area-inset-bottom));
background:rgba(8,12,22,.95);
backdrop-filter:blur(18px);
border-top:1px solid rgba(255,255,255,.08);
max-width:760px;
margin:auto;
}

.nav button{
padding:10px 6px;
font-size:12px;
background:transparent;
color:#cbd5e1;
}

.nav button.active{
background:rgba(255,255,255,.08);
color:#fff;
}

.toast{
position:fixed;
left:50%;
bottom:82px;
transform:translateX(-50%);
background:#111827;
padding:12px 16px;
border-radius:14px;
font-size:13px;
font-weight:700;
display:none;
z-index:99;
}
</style>
</head>

<body>

<div class="header">
<div class="small" id="hello"></div>
<div class="small" id="today"></div>

<div class="small" style="margin-top:10px">Saldo disponible</div>
<div class="big" id="saldoTop">$0</div>

<div class="statusbar">
<div class="pill">Estado<strong id="netState">🟢</strong></div>
<div class="pill">Sincronizados<strong id="syncCount">0</strong></div>
<div class="pill">Pendientes<strong id="pendingCount">0</strong></div>
</div>

<div class="small" style="margin-top:10px" id="lastSync">Sincronizado recién</div>
</div>

<!-- HOME -->
<section class="tab active" id="tab-home">

<div class="card">
<div class="title">➕ Nuevo movimiento</div>

<div class="field">
<label>Fecha</label>
<input type="date" id="fecha">
</div>

<div class="field">
<label>Descripción</label>
<input type="text" id="descripcion">
</div>

<div class="field">
<label>Monto</label>
<input type="text" id="monto" placeholder="Ej: 4.000">
</div>

<div class="field">
<label>Categoría</label>
<select id="categoria">
<option>💰 Ingreso</option>
<option>🍔 Comida</option>
<option>🏠 Vivienda</option>
<option>🚗 Transporte</option>
<option>💡 Servicios</option>
<option>🎮 Entretenimiento</option>
<option>🏦 Ahorro</option>
</select>
</div>

<button class="primary" onclick="guardar()" id="saveBtn">💾 Guardar</button>
</div>

<div class="card">
<div class="title">📌 Resumen</div>

<div class="grid2">
<div class="kpi"><span>Ingresos</span><strong id="ingresos">$0</strong></div>
<div class="kpi"><span>Gastos</span><strong id="gastos">$0</strong></div>
<div class="kpi"><span>Ahorro</span><strong id="ahorro">$0</strong></div>
<div class="kpi"><span>Movimientos</span><strong id="movs">0</strong></div>
</div>
</div>

</section>

<!-- DASHBOARD -->
<section class="tab" id="tab-dashboard">

<div class="card">
<div class="title">🤖 Coach financiero PRO</div>
<div id="coach"></div>
</div>

<div class="card">
<div class="title">📊 Gastos por categoría</div>
<canvas id="chart1"></canvas>
</div>

<div class="card">
<div class="title">📈 Últimos 7 movimientos</div>
<canvas id="chart2"></canvas>
</div>

<div class="card">
<div class="title">💰 Ingreso vs Gasto</div>
<canvas id="chart3"></canvas>
</div>

<div class="card">
<div class="title">🏦 Evolución ahorro</div>
<canvas id="chart4"></canvas>
</div>

</section>

<!-- CALENDAR -->
<section class="tab" id="tab-calendar">
<div class="card">
<div class="title">📆 Historial por fecha</div>
<div class="list" id="calendarData"></div>
</div>
</section>

<!-- LIST -->
<section class="tab" id="tab-more">
<div class="card">
<div class="title">📋 Movimientos</div>
<div class="list" id="lista"></div>
</div>
</section>

<nav class="nav">
<button class="active" onclick="goTab('home',this)">🏠 Inicio</button>
<button onclick="goTab('dashboard',this)">📊 Dashboard</button>
<button onclick="goTab('calendar',this)">📆 Fechas</button>
<button onclick="goTab('more',this)">📋 Lista</button>
</nav>

<div class="toast" id="toast"></div>

<script>
const URL="https://script.google.com/macros/s/AKfycbwXGhRN-TJxXf4hvwk_BFV52Javiqn6Lzz5ps6M1yTz9PJy-9kDcsUKJLzUY-mTS1Z2/exec";

let data=[];
let pending=JSON.parse(localStorage.getItem("pendingQueue")||"[]");

let c1,c2,c3,c4;

fecha.valueAsDate=new Date();

init();
load();

/* ===== INIT ===== */
function init(){
const h=new Date().getHours();

hello.innerText=
h<12?"Buenos días ☀️":
h<19?"Buenas tardes 🌤️":
"Buenas noches 🌙";

today.innerText=new Date().toLocaleDateString("es-CO",{
weekday:"long",day:"numeric",month:"long"
});

setNetwork();
}

/* ===== TOAST ===== */
function toast(msg){
toastEl.innerText=msg;
toastEl.style.display="block";
setTimeout(()=>toastEl.style.display="none",2200);
}
const toastEl=document.getElementById("toast");

/* ===== TABS ===== */
function goTab(tab,btn){
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
document.getElementById("tab-"+tab).classList.add("active");

document.querySelectorAll(".nav button").forEach(x=>x.classList.remove("active"));
btn.classList.add("active");
}

/* ===== NETWORK ===== */
function setNetwork(){
netState.innerText=navigator.onLine?"🟢":"🔴";
pendingCount.innerText=pending.length;
}

window.addEventListener("online",()=>{
setNetwork();
syncPending();
});

window.addEventListener("offline",setNetwork);

/* ===== LOAD ===== */
async function load(){
try{
let r=await fetch(URL);
data=await r.json();

syncCount.innerText=data.length;
lastSync.innerText="Sincronizado recién";

render();

}catch(e){
lastSync.innerText="Sin conexión";
render();
}
}

/* ===== SAVE ===== */
async function guardar(){

let datos={
Fecha:fecha.value,
Categoría:categoria.value,
Descripción:descripcion.value.trim(),
Monto:Number(monto.value.replace(/\./g,"")),
Tipo:categoria.value.includes("Ingreso")?"Ingreso":"Gasto"
};

if(!datos.Descripción || datos.Monto<=0){
toast("Completa datos");
return;
}

saveBtn.disabled=true;
saveBtn.innerText="Guardando...";

if(!navigator.onLine){
pending.push(datos);
localStorage.setItem("pendingQueue",JSON.stringify(pending));
pendingCount.innerText=pending.length;
toast("☁ Pendiente");
saveBtn.disabled=false;
saveBtn.innerText="💾 Guardar";
return;
}

try{
await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify(datos)
});

toast("✔ Guardado");

descripcion.value="";
monto.value="";

await load();

}catch(e){
toast("Error");
}

saveBtn.disabled=false;
saveBtn.innerText="💾 Guardar";
}

/* ===== SYNC ===== */
async function syncPending(){

if(!pending.length) return;

let enviados=0;

while(pending.length){

let item=pending[0];

try{
await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify(item)
});

pending.shift();
enviados++;

}catch(e){
break;
}
}

localStorage.setItem("pendingQueue",JSON.stringify(pending));
pendingCount.innerText=pending.length;

if(enviados){
toast("✔ "+enviados+" sincronizados");
await load();
}
}

/* ===== DELETE ===== */
async function borrar(id){

if(!confirm("¿Eliminar?")) return;

data=data.filter(x=>String(x.ID)!==String(id));
render();

await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify({action:"delete",ID:id})
});

toast("🗑 Eliminado");
}

/* ===== RENDER ===== */
function render(){

lista.innerHTML="";
calendarData.innerHTML="";

let ing=0,gas=0,ah=0;
let categorias={};
let ahorroAcum=[];

data.slice().reverse().forEach((x,i)=>{

let m=Number(x.Monto)||0;

if(x.Tipo==="Ingreso") ing+=m;
else gas+=m;

if(String(x.Categoría).includes("Ahorro")) ah+=m;

if(x.Tipo==="Gasto"){
categorias[x.Categoría]=(categorias[x.Categoría]||0)+m;
}

ahorroAcum.push(ah);

lista.innerHTML+=`
<div class="item ${x.Tipo==="Ingreso"?"ingreso":"gasto"}">
<div>${x.Categoría} - ${x.Descripción}</div>
<div class="price">$${m.toLocaleString("es-CO")}</div>
<button class="small-btn" onclick="borrar('${x.ID}')">🗑️ Borrar</button>
</div>`;

calendarData.innerHTML+=`
<div class="item ${x.Tipo==="Ingreso"?"ingreso":"gasto"}">
<div>${x.Fecha}</div>
<div>${x.Categoría}</div>
<div class="price">$${m.toLocaleString("es-CO")}</div>
</div>`;
});

saldoTop.innerText="$"+(ing-gas).toLocaleString("es-CO");
ingresos.innerText="$"+ing.toLocaleString("es-CO");
gastos.innerText="$"+gas.toLocaleString("es-CO");
ahorro.innerText="$"+ah.toLocaleString("es-CO");
movs.innerText=data.length;

renderCoach(ing,gas,ah,categorias);
renderCharts(ing,gas,categorias,ahorroAcum);
}

/* ===== COACH PRO ===== */
function renderCoach(ing,gas,ah,cats){

let topCat=Object.entries(cats).sort((a,b)=>b[1]-a[1])[0];
let html="";

if(gas>ing){
html+=`<div class="alert bad">🔴 Gastas más de lo que ingresas.</div>`;
}else{
html+=`<div class="alert good">🟢 Balance positivo este mes.</div>`;
}

if(topCat){
html+=`<div class="alert mid">📌 Mayor fuga: ${topCat[0]} ($${topCat[1].toLocaleString("es-CO")})</div>`;
}

html+=`<div class="alert good">🏦 Ahorro actual: $${ah.toLocaleString("es-CO")}</div>`;

let libre=ing-gas;
html+=`<div class="alert mid">💡 Si sigues así cerrarías con $${libre.toLocaleString("es-CO")} libres.</div>`;

if(gas>ing*0.7){
html+=`<div class="alert bad">⚠️ Tus gastos ya consumen más del 70% de ingresos.</div>`;
}

coach.innerHTML=html;
}

/* ===== CHARTS ===== */
function destroyCharts(){
[c1,c2,c3,c4].forEach(x=>x&&x.destroy());
}

function renderCharts(ing,gas,cats,ahorroAcum){

destroyCharts();

/* Dona categorias */
c1=new Chart(chart1,{
type:"doughnut",
data:{
labels:Object.keys(cats),
datasets:[{data:Object.values(cats)}]
}
});

/* Linea ultimos 7 */
let ult=data.slice(-7);
c2=new Chart(chart2,{
type:"line",
data:{
labels:ult.map(x=>x.Fecha),
datasets:[{
label:"Monto",
data:ult.map(x=>x.Monto)
}]
}
});

/* Barras ingreso gasto */
c3=new Chart(chart3,{
type:"bar",
data:{
labels:["Ingresos","Gastos"],
datasets:[{
data:[ing,gas]
}]
}
});

/* Ahorro */
c4=new Chart(chart4,{
type:"line",
data:{
labels:ahorroAcum.map((_,i)=>i+1),
datasets:[{
label:"Ahorro",
data:ahorroAcum
}]
}
});
}
</script>

</body>
</html>
