<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Banking PRO AI v14 LUXE FIX</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#0f172a;
--bg2:#020617;
--card:rgba(255,255,255,.06);
--text:#ffffff;
--muted:#94a3b8;
--line:rgba(255,255,255,.08);
--pri:#2563eb;
--pri2:#0ea5e9;
--ok:#22c55e;
--bad:#ef4444;
}

body.light{
--bg:#f8fafc;
--bg2:#e2e8f0;
--card:#ffffff;
--text:#111827;
--muted:#64748b;
--line:#e5e7eb;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Inter,sans-serif;
background:linear-gradient(180deg,var(--bg),var(--bg2));
color:var(--text);
padding:14px 14px 110px;
max-width:860px;
margin:auto;
transition:.2s;
}

.card,.header{
background:var(--card);
border:1px solid var(--line);
border-radius:22px;
padding:16px;
margin-bottom:12px;
backdrop-filter:blur(16px);
}

.title{font-size:18px;font-weight:800;margin-bottom:10px}
.big{font-size:38px;font-weight:800}
.small{font-size:12px;color:var(--muted)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

.kpi{
background:rgba(255,255,255,.04);
padding:12px;
border-radius:16px;
}

.kpi span{
display:block;
font-size:12px;
color:var(--muted);
margin-bottom:4px;
}

input,select,button{
width:100%;
border:none;
outline:none;
border-radius:16px;
font-family:inherit;
}

input,select{
padding:14px;
margin-bottom:10px;
background:#fff;
color:#111;
font-weight:600;
}

button{
padding:14px;
font-weight:800;
cursor:pointer;
}

.primary{
background:linear-gradient(135deg,var(--pri),var(--pri2));
color:#fff;
}

.secondary{
background:rgba(255,255,255,.08);
color:var(--text);
}

.small-btn{
padding:10px;
font-size:12px;
width:auto;
margin-top:8px;
}

.tab{display:none}
.tab.active{display:block}

.list{display:grid;gap:10px}

.item{
background:rgba(255,255,255,.04);
padding:14px;
border-radius:18px;
border-left:4px solid transparent;
}

.ingreso{border-left-color:var(--ok)}
.gasto{border-left-color:var(--bad)}

.price{
font-size:18px;
font-weight:800;
margin-top:6px;
}

.timeline-day{
font-size:12px;
color:var(--muted);
font-weight:800;
margin-top:8px;
}

.searchBox{position:relative;margin-bottom:10px}
.searchBox input{padding-left:42px;margin-bottom:0}
.searchIcon{position:absolute;left:14px;top:13px;color:var(--muted)}

.nav{
position:fixed;
left:0;right:0;bottom:0;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
padding:10px 12px;
background:rgba(2,6,23,.92);
max-width:860px;
margin:auto;
}

.nav button{
font-size:24px;
padding:8px;
background:transparent;
color:#cbd5e1;
}

.nav button.active{
background:linear-gradient(135deg,#2563eb,#0ea5e9);
color:#fff;
}

.toast{
position:fixed;
left:50%;
bottom:92px;
transform:translateX(-50%);
background:#111827;
color:#fff;
padding:12px 16px;
border-radius:14px;
display:none;
font-size:13px;
z-index:999;
}
</style>
</head>

<body>

<div class="header">

<div class="small">Banking PRO AI v14 LUXE FIX</div>
<div class="small" id="today"></div>

<div class="small" style="margin-top:10px">Saldo disponible</div>
<div class="big" id="saldoTop">$0</div>

<div class="grid2" style="margin-top:12px">
<div class="kpi"><span>Pendientes</span><strong id="pendingCount">0</strong></div>
<div class="kpi"><span>Sincronizados</span><strong id="syncCount">0</strong></div>
</div>

</div>

<!-- HOME -->
<section class="tab active" id="tab-home">

<div class="card">
<div class="title">🎛️ Centro de control</div>
<div class="grid3">

<div class="kpi">
<span>Hoy gastado</span>
<strong id="gastoHoy">$0</strong>
</div>

<div class="kpi">
<span>Ahorro</span>
<strong id="ahorroReal">$0</strong>
</div>

<div class="kpi">
<span>Balance</span>
<strong id="balanceMes">$0</strong>
</div>

</div>
</div>

<div class="card">
<div class="title">➕ Nuevo movimiento</div>

<input type="date" id="fecha">
<input type="text" id="descripcion" placeholder="Descripción">
<input type="text" id="monto" placeholder="Monto 4.000">

<select id="categoria">
<option>💰 Ingreso</option>
<option>🍔 Comida</option>
<option>🏠 Vivienda</option>
<option>🚗 Transporte</option>
<option>💡 Servicios</option>
<option>🎮 Entretenimiento</option>
<option>🏦 Ahorro</option>
</select>

<button class="primary" id="saveBtn" onclick="guardar()">💾 Guardar</button>
</div>

<div class="card">
<div class="title">⭐ Favoritos automáticos</div>
<div class="grid2" id="favList"></div>
</div>

</section>

<!-- DASH -->
<section class="tab" id="tab-dashboard">
<div class="card">
<div class="title">📊 Dashboard</div>
<canvas id="chart1"></canvas>
</div>
</section>

<!-- MOV -->
<section class="tab" id="tab-list">
<div class="card">
<div class="title">📋 Movimientos</div>

<div class="searchBox">
<div class="searchIcon">🔎</div>
<input type="text" id="searchMov" placeholder="Buscar..." oninput="renderMovimientos()">
</div>

<div class="list" id="lista"></div>
</div>
</section>

<!-- SETTINGS -->
<section class="tab" id="tab-settings">

<div class="card">
<div class="title">⚙️ Apariencia</div>

<button class="secondary" onclick="setTheme('dark')">🌙 Modo oscuro</button>
<br><br>
<button class="secondary" onclick="setTheme('light')">☀️ Modo claro</button>

</div>

</section>

<nav class="nav">
<button class="active" onclick="goTab('home',this)">🏠</button>
<button onclick="goTab('dashboard',this)">📊</button>
<button onclick="goTab('list',this)">📋</button>
<button onclick="goTab('settings',this)">⚙️</button>
</nav>

<div class="toast" id="toast"></div>

<script>
const URL="https://script.google.com/macros/s/AKfycbwXGhRN-TJxXf4hvwk_BFV52Javiqn6Lzz5ps6M1yTz9PJy-9kDcsUKJLzUY-mTS1Z2/exec";

let data=[];
let pending=JSON.parse(localStorage.getItem("pendingQueue")||"[]");
let chart;

fecha.valueAsDate=new Date();
today.innerText=new Date().toLocaleDateString("es-CO",{weekday:"long",day:"numeric",month:"long"});
pendingCount.innerText=pending.length;

if(localStorage.getItem("theme")==="light"){
document.body.classList.add("light");
}

load();
syncPending();

function toast(t){
toastEl.innerText=t;
toastEl.style.display="block";
setTimeout(()=>toastEl.style.display="none",2200);
}
const toastEl=document.getElementById("toast");

function goTab(tab,btn){
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
document.getElementById("tab-"+tab).classList.add("active");

document.querySelectorAll(".nav button").forEach(x=>x.classList.remove("active"));
btn.classList.add("active");
}

function setTheme(mode){
if(mode==="light"){
document.body.classList.add("light");
}else{
document.body.classList.remove("light");
}
localStorage.setItem("theme",mode);
toast("Tema actualizado");
}

function money(n){
return "$"+Number(n).toLocaleString("es-CO");
}

async function load(){
try{
let r=await fetch(URL+"?t="+Date.now());
data=await r.json();
syncCount.innerText=data.length;
render();
}catch(e){}
}

async function guardar(){

let obj={
Fecha:fecha.value,
Categoría:categoria.value,
Descripción:descripcion.value.trim(),
Monto:Number(monto.value.replace(/\./g,"")),
Tipo:categoria.value.includes("Ingreso")?"Ingreso":"Gasto"
};

if(!obj.Descripción || obj.Monto<=0){
toast("Completa datos");
return;
}

saveBtn.disabled=true;
saveBtn.innerText="Guardando...";

try{
await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify(obj)
});
toast("Guardado");
await load();

}catch(e){
pending.push(obj);
localStorage.setItem("pendingQueue",JSON.stringify(pending));
pendingCount.innerText=pending.length;
toast("Offline");
}

descripcion.value="";
monto.value="";
saveBtn.disabled=false;
saveBtn.innerText="💾 Guardar";
}

window.addEventListener("online",syncPending);

async function syncPending(){

if(!pending.length) return;

let ok=0;

while(pending.length){

try{
await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify(pending[0])
});

pending.shift();
ok++;

}catch(e){break;}
}

localStorage.setItem("pendingQueue",JSON.stringify(pending));
pendingCount.innerText=pending.length;

if(ok){
toast(ok+" sincronizados");
load();
}
}

async function borrar(id){

if(!confirm("Eliminar movimiento")) return;

data=data.filter(x=>String(x.ID)!==String(id));
render();

await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify({action:"delete",ID:id})
});
}

function renderFavorites(){

let map={};

data.forEach(x=>{
let k=x.Categoría+"|"+x.Descripción+"|"+x.Monto;

if(!map[k]) map[k]={...x,c:0};

map[k].c++;
});

let arr=Object.values(map).sort((a,b)=>b.c-a.c).slice(0,6);

favList.innerHTML="";

arr.forEach(f=>{
favList.innerHTML+=`
<button class="secondary"
onclick="categoria.value='${f.Categoría}';descripcion.value='${f.Descripción}';monto.value='${f.Monto}'">
${f.Categoría}<br><small>${f.Descripción}</small>
</button>`;
});
}

function renderMovimientos(){

let q=searchMov.value.toLowerCase().trim();

let rows=[...data].sort((a,b)=>new Date(b.Fecha)-new Date(a.Fecha));

if(q){
rows=rows.filter(x=>
String(x.Fecha).toLowerCase().includes(q)||
String(x.Categoría).toLowerCase().includes(q)||
String(x.Descripción).toLowerCase().includes(q)||
String(x.Monto).includes(q)
);
}

lista.innerHTML="";
let last="";

rows.forEach(x=>{

if(last!==x.Fecha){
lista.innerHTML+=`<div class="timeline-day">${x.Fecha}</div>`;
last=x.Fecha;
}

lista.innerHTML+=`
<div class="item ${x.Tipo==="Ingreso"?"ingreso":"gasto"}">
<div style="font-weight:800">${x.Descripción}</div>
<div class="small">${x.Categoría}</div>
<div class="price">${money(x.Monto)}</div>
<button class="small-btn" onclick="borrar('${x.ID}')">🗑️</button>
</div>`;
});
}

function render(){

let saldo=0,ing=0,gas=0,aho=0;
let cats={};

let hoy=new Date().toISOString().slice(0,10);
let gastoHoyNum=0;

data.forEach(x=>{

let m=Number(x.Monto)||0;

if(x.Tipo==="Ingreso"){saldo+=m;ing+=m;}
else{saldo-=m;gas+=m;}

if(x.Categoría.includes("Ahorro")) aho+=m;

if(x.Tipo==="Gasto"){
cats[x.Categoría]=(cats[x.Categoría]||0)+m;
}

if(x.Fecha===hoy && x.Tipo==="Gasto"){
gastoHoyNum+=m;
}

});

saldoTop.innerText=money(saldo);
gastoHoy.innerText=money(gastoHoyNum);
ahorroReal.innerText=money(aho);
balanceMes.innerText=money(ing-gas);

renderFavorites();
renderMovimientos();
draw(cats);
}

function draw(cats){

if(chart) chart.destroy();

chart=new Chart(chart1,{
type:"doughnut",
data:{
labels:Object.keys(cats),
datasets:[{data:Object.values(cats)}]
}
});
}
</script>

</body>
</html>
