<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Banking PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{
font-family:'Inter',sans-serif;
background:radial-gradient(circle at top,#0f172a,#05070f);
color:#fff;
padding:14px;
}

h1{font-size:30px;font-weight:800;margin-bottom:6px;}
.sub{opacity:.6;margin-bottom:14px;font-size:13px;}

.top{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:16px;}

.card{
background:rgba(255,255,255,.06);
backdrop-filter:blur(14px);
padding:16px;
border-radius:18px;
border:1px solid rgba(255,255,255,.08);
}

.card span{font-size:12px;opacity:.6;}
.card strong{font-size:22px;font-weight:800;}

.panel{
background:rgba(255,255,255,.05);
backdrop-filter:blur(14px);
padding:14px;
border-radius:22px;
border:1px solid rgba(255,255,255,.08);
}

form{display:grid;gap:10px;}

input,select,button{
width:100%;
padding:14px;
font-size:15px;
border:none;
border-radius:12px;
outline:none;
}

input,select{background:#fff;color:#111;}

.primary{background:linear-gradient(135deg,#0ea5e9,#2563eb);color:#fff;font-weight:800;}
.secondary{background:rgba(255,255,255,.12);color:#fff;font-weight:700;}

.list{display:grid;gap:10px;margin-top:14px;}

.item{
background:rgba(255,255,255,.05);
padding:12px;
border-radius:14px;
position:relative;
animation:fade .15s ease-in;
}

@keyframes fade{
from{opacity:0;transform:translateY(4px);}
to{opacity:1;transform:translateY(0);}
}

.item.ingreso::before,
.item.gasto::before{
content:"";
position:absolute;
left:0;top:0;bottom:0;width:4px;
}

.item.ingreso::before{background:#22c55e;}
.item.gasto::before{background:#ef4444;}

.title{font-weight:700;font-size:14px;}
.price{font-weight:800;margin-top:4px;}

.delete{
margin-top:8px;
background:rgba(239,68,68,.15);
color:#fff;
padding:8px;
border-radius:10px;
font-size:12px;
}

#dashboard{display:none;}

canvas{
background:rgba(255,255,255,.03);
border-radius:16px;
padding:10px;
margin-top:12px;
}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
padding:12px 16px;
border-radius:12px;
font-weight:700;
z-index:9999;
}
</style>
</head>

<body>

<div id="app">

<h1>🏦 Banking PRO</h1>
<div class="sub">UI ultra rápida optimizada</div>

<button class="secondary" onclick="irDashboard()" style="margin-bottom:12px;">
📊 Dashboard
</button>

<div class="top">

<div class="card">
<span>💸 Hoy</span>
<strong id="hoy">$0</strong>
</div>

<div class="card">
<span>📊 Registros</span>
<strong id="registros">0</strong>
</div>

<div class="card">
<span>🏦 Ahorro</span>
<strong id="ahorro">$0</strong>
</div>

<div class="card">
<span>⏳ Pendientes</span>
<strong id="pendientes">0</strong>
</div>

</div>

<div class="panel">

<form id="formulario">

<input type="date" id="fecha" required>
<input type="text" id="descripcion" placeholder="Descripción" required>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
<input type="text" id="monto" placeholder="4.000" required>

<select id="categoria">
<option>💰 Ingreso</option>
<option>🍔 Comida</option>
<option>🏠 Vivienda</option>
<option>🚗 Transporte</option>
<option>💡 Servicios</option>
<option>🎮 Entretenimiento</option>
<option>🏦 Ahorro</option>
</select>
</div>

<button class="primary" id="btnSave" type="submit">Guardar</button>

</form>

<div class="list" id="lista"></div>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<button class="secondary" onclick="irApp()">⬅ Volver</button>

<br><br>

<div class="top">

<div class="card"><span>Ingresos</span><strong id="ingresos">$0</strong></div>
<div class="card"><span>Gastos</span><strong id="gastos">$0</strong></div>
<div class="card"><span>Ahorro</span><strong id="ahorroTotal">$0</strong></div>
<div class="card"><span>Balance</span><strong id="balance">$0</strong></div>

</div>

<canvas id="pie"></canvas>
<canvas id="bar"></canvas>

</div>

<script>

const URL="https://script.google.com/macros/s/AKfycbwXGhRN-TJxXf4hvwk_BFV52Javiqn6Lzz5ps6M1yTz9PJy-9kDcsUKJLzUY-mTS1Z2/exec";

let data=[];
let pendientesLocal=JSON.parse(localStorage.getItem("pendientes")||"[]");
let bloqueado=false;
let syncing=false;

let pie=null,bar=null;

/* NAV */
function irDashboard(){
document.getElementById("app").style.display="none";
document.getElementById("dashboard").style.display="block";
load();
}

function irApp(){
document.getElementById("dashboard").style.display="none";
document.getElementById("app").style.display="block";
}

/* TOAST */
function toast(msg,color="#22c55e"){
let t=document.createElement("div");
t.className="toast";
t.innerText=msg;
t.style.background=color;
document.body.appendChild(t);
setTimeout(()=>t.remove(),2000);
}

/* UI FAST */
function setLoading(state){
let btn=document.getElementById("btnSave");
btn.disabled=state;
btn.innerText=state?"Guardando...":"Guardar";
bloqueado=state;
}

/* PENDIENTES */
function renderPendientes(){
document.getElementById("pendientes").innerText=pendientesLocal.length;
}

/* LOAD */
async function load(){
try{
let r=await fetch(URL);
data=await r.json();
}catch(e){
data=data||[];
}

render();
dash();
syncOffline();
}

/* ⚡ RENDER ULTRA RÁPIDO */
function addItemUI(x){
let lista=document.getElementById("lista");

lista.insertAdjacentHTML("afterbegin",`
<div class="item ${x.Tipo==="Ingreso"?"ingreso":"gasto"}">
<div class="title">${x.Categoría} - ${x.Descripción}</div>
<div class="price">$${Number(x.Monto).toLocaleString()}</div>
<button class="delete" onclick="borrar('${x.ID}')">🗑️ borrar</button>
</div>
`);
}

/* RENDER FULL */
function render(){

document.getElementById("registros").innerText=data.length;

let hoy=new Date().toISOString().split("T")[0];
let gastosHoy=0,ing=0,gas=0,ah=0;

let lista=document.getElementById("lista");
lista.innerHTML="";

data.forEach(x=>{

let m=+x.Monto;

if(x.Tipo==="Ingreso") ing+=m;
else gas+=m;

if(x.Categoría.includes("Ahorro")) ah+=m;

if(x.Fecha===hoy && x.Tipo==="Gasto") gastosHoy+=m;

addItemUI(x);
});

document.getElementById("hoy").innerText="$"+gastosHoy.toLocaleString();
document.getElementById("ahorro").innerText="$"+ah.toLocaleString();

renderPendientes();
}

/* DASH */
function dash(){

let ing=0,gas=0,ah=0;
let cat={};

data.forEach(x=>{
let m=+x.Monto;

if(x.Tipo==="Ingreso") ing+=m;
else gas+=m;

if(x.Categoría.includes("Ahorro")) ah+=m;

cat[x.Categoría]=(cat[x.Categoría]||0)+m;
});

document.getElementById("ingresos").innerText="$"+ing.toLocaleString();
document.getElementById("gastos").innerText="$"+gas.toLocaleString();
document.getElementById("ahorroTotal").innerText="$"+ah.toLocaleString();
document.getElementById("balance").innerText="$"+(ing-gas).toLocaleString();

if(pie) pie.destroy();
if(bar) bar.destroy();

pie=new Chart(document.getElementById("pie"),{
type:"doughnut",
data:{labels:Object.keys(cat),datasets:[{data:Object.values(cat)}]}
});

bar=new Chart(document.getElementById("bar"),{
type:"bar",
data:{labels:["Ingresos","Gastos","Ahorro"],datasets:[{data:[ing,gas,ah]}]}
});
}

/* 🔥 SAVE ULTRA RÁPIDO */
document.getElementById("formulario").addEventListener("submit",async e=>{
e.preventDefault();

if(bloqueado) return;
setLoading(true);

let datos={
Fecha:fecha.value,
Categoría:categoria.value,
Descripción:descripcion.value,
Monto:Number(monto.value.replace(/\./g,"")),
Tipo:categoria.value.includes("Ingreso")?"Ingreso":"Gasto"
};

/* UI INSTANTÁNEA */
addItemUI(datos);
data.unshift(datos);
document.getElementById("registros").innerText=data.length;

if(!navigator.onLine){

pendientesLocal.push(datos);
localStorage.setItem("pendientes",JSON.stringify(pendientesLocal));
renderPendientes();

toast("Offline 📴","#f59e0b");
setLoading(false);
formulario.reset();
fecha.valueAsDate=new Date();
return;
}

fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify(datos)
}).then(()=>{
toast("Guardado ✔️");
syncOffline();
});

setLoading(false);
formulario.reset();
fecha.valueAsDate=new Date();
});

/* ⚡ DELETE INSTANT */
function borrar(id){

if(bloqueado) return;
if(!confirm("Eliminar?")) return;

/* UI INSTANT */
data = data.filter(x=>x.ID != id);
render();
dash();

/* backend async */
fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify({action:"delete",ID:id})
}).then(()=>{
toast("Eliminado ✔️","#ef4444");
});

}

/* ⚡ FAST SYNC */
async function syncOffline(){

if(syncing) return;
if(!navigator.onLine || pendientesLocal.length===0) return;

syncing=true;

let ok=[];
let fail=[];

await Promise.all(pendientesLocal.map(async item=>{

try{
await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify(item)
});
ok.push(item);
}catch(e){
fail.push(item);
}

}));

pendientesLocal=fail;
localStorage.setItem("pendientes",JSON.stringify(pendientesLocal));

renderPendientes();

if(ok.length){
toast(`Sync ${ok.length} ✔️`);
}

syncing=false;
}

/* AUTO SYNC */
window.addEventListener("online",syncOffline);

/* INIT */
let fecha=document.getElementById("fecha");
let descripcion=document.getElementById("descripcion");
let monto=document.getElementById("monto");
let categoria=document.getElementById("categoria");

fecha.valueAsDate=new Date();
renderPendientes();
load();

</script>

</body>
</html>
