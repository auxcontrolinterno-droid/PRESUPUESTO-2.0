<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Banking PRO 4.0</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
font-family:Inter;
background:linear-gradient(180deg,#070b16,#0b1020);
color:#fff;
padding:14px;
}

h1{
font-size:26px;
margin-bottom:6px;
}

.subtitle{
opacity:.6;
font-size:13px;
margin-bottom:14px;
}

/* CARDS MODERNAS */
.card{
background:rgba(255,255,255,.06);
backdrop-filter:blur(14px);
padding:16px;
border-radius:16px;
border:1px solid rgba(255,255,255,.08);
margin-bottom:12px;
}

/* INPUTS */
input,select,button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:8px;
font-size:14px;
}

.primary{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:#fff;
font-weight:700;
}

.secondary{
background:rgba(255,255,255,.12);
color:#fff;
}

/* LISTA */
.list{
display:grid;
gap:10px;
margin-top:10px;
}

.item{
background:rgba(255,255,255,.05);
padding:12px;
border-radius:12px;
border-left:3px solid transparent;
}

.ingreso{border-left-color:#22c55e;}
.gasto{border-left-color:#ef4444;}

.price{
font-weight:800;
margin-top:4px;
}

/* ALERTAS */
.alert{
padding:10px;
border-radius:12px;
margin-top:8px;
font-size:13px;
}

.good{background:rgba(34,197,94,.15);color:#22c55e;}
.mid{background:rgba(245,158,11,.15);color:#f59e0b;}
.bad{background:rgba(239,68,68,.15);color:#ef4444;}

/* DASHBOARD STYLE */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.stat{
background:rgba(255,255,255,.05);
padding:14px;
border-radius:14px;
}

.stat h3{
font-size:12px;
opacity:.6;
}

.stat strong{
font-size:18px;
}
</style>
</head>

<body>

<h1>🏦 Banking PRO</h1>
<div class="subtitle">versión financiera inteligente</div>

<!-- FORM -->
<div class="card">

<input type="date" id="fecha">
<input type="text" id="descripcion" placeholder="Descripción">
<input type="text" id="monto" placeholder="Ej: 4.000">

<select id="categoria">
<option>💰 Ingreso</option>
<option>🍔 Comida</option>
<option>🏠 Vivienda</option>
<option>🚗 Transporte</option>
<option>💡 Servicios</option>
<option>🎮 Entretenimiento</option>
<option>🏦 Ahorro</option>
</select>

<button class="primary" onclick="guardar()">Guardar movimiento</button>

</div>

<!-- DASHBOARD -->
<div class="card">

<div class="grid">
<div class="stat">
<h3>Ingresos</h3>
<strong id="ing">$0</strong>
</div>

<div class="stat">
<h3>Gastos</h3>
<strong id="gas">$0</strong>
</div>

<div class="stat">
<h3>Ahorro</h3>
<strong id="ah">$0</strong>
</div>

<div class="stat">
<h3>Balance</h3>
<strong id="bal">$0</strong>
</div>
</div>

<div id="alerts"></div>

</div>

<!-- LISTA -->
<div class="card">
<h3>Movimientos</h3>
<div class="list" id="lista"></div>
</div>

<script>

const URL="https://script.google.com/macros/s/AKfycbwXGhRN-TJxXf4hvwk_BFV52Javiqn6Lzz5ps6M1yTz9PJy-9kDcsUKJLzUY-mTS1Z2/exec";

let data=[];

/* INIT */
fecha.valueAsDate=new Date();
load();

/* LOAD */
async function load(){
let r=await fetch(URL);
data=await r.json();
render();
}

/* SAVE */
async function guardar(){

let datos={
Fecha:fecha.value,
Categoría:categoria.value,
Descripción:descripcion.value,
Monto:Number(monto.value.replace(/\./g,"")),
Tipo:categoria.value.includes("Ingreso")?"Ingreso":"Gasto"
};

await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify(datos)
});

monto.value="";
descripcion.value="";
load();
}

/* RENDER */
function render(){

let ing=0,gas=0,ah=0;
let cat={};

let lista=document.getElementById("lista");
lista.innerHTML="";

data.forEach(x=>{

let m=+x.Monto;

if(x.Tipo==="Ingreso") ing+=m;
else gas+=m;

if(x.Categoría.includes("Ahorro")) ah+=m;

cat[x.Categoría]=(cat[x.Categoría]||0)+m;

lista.innerHTML+=`
<div class="item ${x.Tipo==="Ingreso"?"ingreso":"gasto"}">
${x.Categoría} - ${x.Descripción}
<div class="price">$${m.toLocaleString()}</div>
</div>
`;

});

document.getElementById("ing").innerText="$"+ing.toLocaleString();
document.getElementById("gas").innerText="$"+gas.toLocaleString();
document.getElementById("ah").innerText="$"+ah.toLocaleString();
document.getElementById("bal").innerText="$"+(ing-gas).toLocaleString();

/* 🧠 IA */
generateAlerts(ing,gas,cat);
}

/* 🧠 FASE 4 IA */
function generateAlerts(ing,gas,cat){

let alerts=document.getElementById("alerts");
alerts.innerHTML="";

let top=Object.entries(cat).sort((a,b)=>b[1]-a[1])[0];

let msg="";

if(gas>ing){
msg="🔴 Estás gastando más de lo que ingresas";
alerts.innerHTML+=`<div class="alert bad">${msg}</div>`;
}

if(top && top[1]>gas*0.5){
alerts.innerHTML+=`<div class="alert mid">⚠️ Alta concentración en ${top[0]}</div>`;
}

let promedio=gas/data.length || 0;

if(promedio>50000){
alerts.innerHTML+=`<div class="alert mid">📊 Gasto promedio alto: $${promedio.toFixed(0)}</div>`;
}else{
alerts.innerHTML+=`<div class="alert good">🟢 Gasto controlado</div>`;
}

}

</script>

</body>
</html>
