<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Banking PRO AI v13</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg1:#07111f;
--bg2:#0f172a;
--card:rgba(255,255,255,.06);
--line:rgba(255,255,255,.08);
--text:#fff;
--muted:#94a3b8;
--input:#fff;
--inputText:#111;
--primary:#2563eb;
--primary2:#1d4ed8;
--ok:#22c55e;
--bad:#ef4444;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:Inter,sans-serif;
background:linear-gradient(180deg,var(--bg1),var(--bg2));
color:var(--text);
padding:14px 14px 110px;
max-width:820px;
margin:auto;
}

.card,.header{
background:var(--card);
border:1px solid var(--line);
border-radius:22px;
padding:16px;
margin-bottom:12px;
backdrop-filter:blur(14px);
}

.title{font-size:17px;font-weight:800;margin-bottom:10px}
.big{font-size:34px;font-weight:800}
.small{font-size:12px;color:var(--muted)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gridFav{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.kpi{
background:rgba(255,255,255,.04);
padding:12px;
border-radius:14px;
}

.kpi span{
display:block;
font-size:12px;
color:var(--muted);
margin-bottom:4px;
}

input,select,button{
width:100%;
border:none;
outline:none;
border-radius:14px;
font-family:inherit;
}

input,select{
padding:14px;
background:var(--input);
color:var(--inputText);
font-weight:600;
margin-bottom:10px;
}

button{
padding:14px;
font-weight:800;
cursor:pointer;
}

.primary{
background:linear-gradient(135deg,var(--primary),var(--primary2));
color:#fff;
}

.secondary{
background:rgba(255,255,255,.08);
color:#fff;
}

.small-btn{
padding:10px 12px;
font-size:12px;
background:rgba(255,255,255,.08);
width:auto;
color:#fff;
margin-top:8px;
}

.tab{display:none}
.tab.active{display:block}

.list{display:grid;gap:10px}

.item{
background:rgba(255,255,255,.04);
padding:12px;
border-radius:14px;
border-left:4px solid transparent;
}

.ingreso{border-left-color:#22c55e}
.gasto{border-left-color:#ef4444}

.price{
font-weight:800;
margin-top:6px;
}

.nav{
position:fixed;
left:0;right:0;bottom:0;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
padding:10px 12px calc(10px + env(safe-area-inset-bottom));
background:rgba(5,10,20,.94);
backdrop-filter:blur(16px);
max-width:820px;
margin:auto;
}

.nav button{
font-size:24px;
padding:8px;
background:transparent;
color:#cbd5e1;
}

.nav button.active{
background:rgba(255,255,255,.08);
color:#fff;
}

.toast{
position:fixed;
left:50%;
bottom:95px;
transform:translateX(-50%);
background:#111827;
color:#fff;
padding:12px 16px;
border-radius:14px;
font-size:13px;
font-weight:700;
display:none;
z-index:999;
}

.timeline-day{
font-size:12px;
color:var(--muted);
font-weight:800;
margin:10px 0 4px;
}
</style>
</head>

<body>

<div class="header">

<div class="small">Banking PRO AI v13</div>
<div class="small" id="today"></div>

<div class="small" style="margin-top:10px">Saldo disponible</div>
<div class="big" id="saldoTop">$0</div>

<div class="grid2" style="margin-top:12px">
<div class="kpi">
<span>Pendientes</span>
<strong id="pendingCount">0</strong>
</div>

<div class="kpi">
<span>Sincronizados</span>
<strong id="syncCount">0</strong>
</div>
</div>

</div>

<!-- HOME -->
<section class="tab active" id="tab-home">

<div class="card">
<div class="title">➕ Nuevo movimiento</div>

<input type="date" id="fecha">
<input type="text" id="descripcion" placeholder="Descripción">
<input type="text" id="monto" placeholder="Monto">

<select id="categoria">
<option>💰 Ingreso</option>
<option>🍔 Comida</option>
<option>🏠 Vivienda</option>
<option>🚗 Transporte</option>
<option>💡 Servicios</option>
<option>🎮 Entretenimiento</option>
<option>🏦 Ahorro</option>
</select>

<button class="primary" id="saveBtn" onclick="guardar()">💾 Guardar</button>
</div>

<div class="card">
<div class="title">⭐ Favoritos automáticos</div>
<div class="gridFav" id="favList"></div>
</div>

</section>

<!-- DASH -->
<section class="tab" id="tab-dashboard">

<div class="card">
<div class="title">📊 Categorías</div>
<canvas id="chart1"></canvas>
</div>

</section>

<!-- MOVS -->
<section class="tab" id="tab-list">

<div class="card">
<div class="title">📋 Movimientos</div>
<div class="list" id="lista"></div>
</div>

</section>

<!-- SETTINGS -->
<section class="tab" id="tab-settings">

<div class="card">
<div class="title">⚙️ Ajustes</div>
<button class="secondary" onclick="load()">🔄 Recargar</button>
</div>

</section>

<nav class="nav">
<button class="active" onclick="goTab('home',this)">🏠</button>
<button onclick="goTab('dashboard',this)">📊</button>
<button onclick="goTab('list',this)">📋</button>
<button onclick="goTab('settings',this)">⚙️</button>
</nav>

<div class="toast" id="toast"></div>

<script>
const URL="https://script.google.com/macros/s/AKfycbwXGhRN-TJxXf4hvwk_BFV52Javiqn6Lzz5ps6M1yTz9PJy-9kDcsUKJLzUY-mTS1Z2/exec";

let data=[];
let pending=JSON.parse(localStorage.getItem("pendingQueue")||"[]");
let c1;

fecha.valueAsDate=new Date();
today.innerText=new Date().toLocaleDateString("es-CO",{weekday:"long",day:"numeric",month:"long"});
pendingCount.innerText=pending.length;

load();
syncPending();

/* toast */
function toast(msg){
toastEl.innerText=msg;
toastEl.style.display="block";
setTimeout(()=>toastEl.style.display="none",2200);
}
const toastEl=document.getElementById("toast");

/* tabs */
function goTab(tab,btn){
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
document.getElementById("tab-"+tab).classList.add("active");

document.querySelectorAll(".nav button").forEach(x=>x.classList.remove("active"));
btn.classList.add("active");
}

/* helpers */
function money(n){
return "$"+Number(n).toLocaleString("es-CO");
}

/* load */
async function load(){
try{
let r=await fetch(URL+"?t="+Date.now());
data=await r.json();
syncCount.innerText=data.length;
render();
}catch(e){}
}

/* save */
async function guardar(){

let datos={
Fecha:fecha.value,
Categoría:categoria.value,
Descripción:descripcion.value.trim(),
Monto:Number(monto.value.replace(/\./g,"")),
Tipo:categoria.value.includes("Ingreso")?"Ingreso":"Gasto"
};

if(!datos.Descripción || datos.Monto<=0){
toast("Completa datos");
return;
}

saveBtn.disabled=true;
saveBtn.innerText="Guardando...";

if(!navigator.onLine){
pending.push(datos);
localStorage.setItem("pendingQueue",JSON.stringify(pending));
pendingCount.innerText=pending.length;
doneSave();
toast("☁ Offline");
return;
}

try{
await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify(datos)
});

toast("✔ Guardado");
await load();

}catch(e){

pending.push(datos);
localStorage.setItem("pendingQueue",JSON.stringify(pending));
pendingCount.innerText=pending.length;

toast("☁ Offline");
}

doneSave();
}

function doneSave(){
descripcion.value="";
monto.value="";
saveBtn.disabled=false;
saveBtn.innerText="💾 Guardar";
}

/* sync */
window.addEventListener("online",syncPending);

async function syncPending(){

if(!navigator.onLine || !pending.length) return;

let sent=0;

while(pending.length){

try{
await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify(pending[0])
});

pending.shift();
sent++;

}catch(e){
break;
}
}

localStorage.setItem("pendingQueue",JSON.stringify(pending));
pendingCount.innerText=pending.length;

if(sent){
toast("✔ "+sent+" sincronizados");
load();
}
}

/* delete */
async function borrar(id){

if(!confirm("Eliminar movimiento")) return;

data=data.filter(x=>String(x.ID)!==String(id));
render();

try{
await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify({action:"delete",ID:id})
});

toast("Eliminado");

}catch(e){}
}

/* favoritos automáticos */
function renderFavorites(){

let map={};

data.forEach(x=>{

let key=x.Categoría+"|"+x.Descripción+"|"+x.Monto;

if(!map[key]){
map[key]={
cat:x.Categoría,
des:x.Descripción,
monto:Number(x.Monto),
count:0
};
}

map[key].count++;
});

let arr=Object.values(map)
.sort((a,b)=>b.count-a.count)
.slice(0,6);

favList.innerHTML="";

if(!arr.length){
favList.innerHTML='<div class="small">Aún sin datos suficientes</div>';
return;
}

arr.forEach(f=>{

favList.innerHTML+=`
<button class="secondary"
onclick="usarFav('${f.cat}','${f.des}',${f.monto})">
${f.cat}<br>
<span style="font-size:11px">${f.des}</span><br>
<span style="font-size:11px">${money(f.monto)}</span>
</button>`;
});
}

function usarFav(cat,des,m){

categoria.value=cat;
descripcion.value=des;
monto.value=Number(m).toLocaleString("es-CO");

toast("Favorito cargado");
}

/* render */
function render(){

lista.innerHTML="";

let saldo=0;
let cats={};

let sorted=[...data].sort((a,b)=>new Date(b.Fecha)-new Date(a.Fecha));

let last="";

sorted.forEach(x=>{

let montoNum=Number(x.Monto)||0;

if(x.Tipo==="Ingreso") saldo+=montoNum;
else saldo-=montoNum;

if(x.Tipo==="Gasto"){
cats[x.Categoría]=(cats[x.Categoría]||0)+montoNum;
}

if(last!==x.Fecha){
lista.innerHTML+=`<div class="timeline-day">${x.Fecha}</div>`;
last=x.Fecha;
}

lista.innerHTML+=`
<div class="item ${x.Tipo==="Ingreso"?"ingreso":"gasto"}">
<div>${x.Categoría} - ${x.Descripción}</div>
<div class="price">${money(montoNum)}</div>
<button class="small-btn" onclick="borrar('${x.ID}')">🗑️</button>
</div>`;
});

saldoTop.innerText=money(saldo);

renderFavorites();
chart(cats);
}

/* chart */
function chart(cats){

if(c1) c1.destroy();

c1=new Chart(chart1,{
type:"doughnut",
data:{
labels:Object.keys(cats),
datasets:[{
data:Object.values(cats)
}]
}
});
}
</script>

</body>
</html>
