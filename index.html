<!DOCTYPE html>
<html lang="es">  
<head>  
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">  
<title>Banking PRO AI v12</title>  

<meta name="theme-color" content="#0f172a">  
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">  
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>  

<style>
:root{
--bg1:#07111f;
--bg2:#0f172a;
--card:rgba(255,255,255,.06);
--line:rgba(255,255,255,.08);
--text:#fff;
--muted:#94a3b8;

--bg1:#eef2ff;
--bg2:#ffffff;

body{

/* TODO TU CSS ORIGINAL INTACTO */
</style>
</head>

<body>

<div class="header">
<div class="small">Banking PRO AI v12</div>  
<div class="small" id="today"></div>  
<div class="small" style="margin-top:10px">Saldo disponible</div>  
<div class="big" id="saldoTop">$0</div>  
<div class="eye" onclick="toggleHide()">👁 Mostrar / ocultar montos</div>  

<div class="grid3" style="margin-top:12px">  
<div class="kpi">  
<span>Pendientes</span>  
<strong id="pendingCount">0</strong>  
</div>  
<div class="kpi">  
<span>Sincronizados</span>  
<strong id="syncCount">0</strong>  
</div>  
<div class="kpi">  
<span>Racha</span>  
<strong id="streakBox">0</strong>  
</div>  
</div>  
</div>  

<section class="tab active" id="tab-home">

<div class="card">
<div class="title">🎛️ Centro de mando</div>
<div id="cockpit"></div>
</div>

<div class="card">
<div class="title">➕ Nuevo movimiento</div>

<input type="date" id="fecha">
<input type="text" id="descripcion" placeholder="Descripción">
<input type="text" id="monto" placeholder="Monto 4.000">

<select id="categoria">
<option>💰 Ingreso</option>
<option>🍔 Comida</option>
<option>🏠 Vivienda</option>
<option>🚗 Transporte</option>
<option>💡 Servicios</option>
<option>🎮 Entretenimiento</option>
<option>🏦 Ahorro</option>
</select>

<button class="primary" id="saveBtn" onclick="guardar()">💾 Guardar</button>
</div>

<div class="card">
<div class="title">⭐ Favoritos automáticos</div>
<div class="fav-grid" id="favList"></div>
</div>

<div class="card">
<div class="title">🧠 Coach Financiero</div>
<div id="coach"></div>
</div>

</section>

<!-- TODO RESTO DE TABS Y HTML EXACTAMENTE IGUAL -->
<!-- (dashboard, goals, list, settings, nav, charts, etc SIN CAMBIOS) -->

<div class="toast" id="toast"></div>

<script>

const URL="https://script.google.com/macros/s/AKfycbwXGhRN-TJxXf4hvwk_BFV52Javiqn6Lzz5ps6M1yTz9PJy-9kDcsUKJLzUY-mTS1Z2/exec";  

let data=[];
let pending=JSON.parse(localStorage.getItem("pendingQueue")||"[]");

/* 🔥 NUEVO: recurrentes */
let recurring = JSON.parse(localStorage.getItem("recurring") || "[]");

let hidden=localStorage.getItem("hideMoney")==="1";  
let goals=JSON.parse(localStorage.getItem("goals")||"[]");  
let streak=Number(localStorage.getItem("streak")||0);  

fecha.valueAsDate=new Date();

today.innerText=new Date().toLocaleDateString("es-CO",{  
weekday:"long",day:"numeric",month:"long"  
});

pendingCount.innerText=pending.length;  
streakBox.innerText=streak;

load();  
syncPending();  

runRecurring(); // 🔥 NUEVO

/* ================= FIX LOAD ================= */
async function load(){
try{
let r=await fetch(URL+"?t="+Date.now());
data=await r.json();

/* 🔥 FIX CRÍTICO */
data = data.map(x => ({
...x,
Monto: Number(x.Monto) || 0
}));

syncCount.innerText=data.length;
render();

}catch(e){}
}

/* ================= GUARDAR ================= */
async function guardar(){

let datos={
Fecha:fecha.value,
Categoría:categoria.value,
Descripción:descripcion.value.trim(),
Monto:Number(monto.value.replace(/\./g,"")),
Tipo:categoria.value.includes("Ingreso")?"Ingreso":"Gasto"
};

saveBtn.disabled=true;
saveBtn.innerText="Guardando...";

try{
await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify(datos)
});
await load();
}catch(e){
pending.push(datos);
localStorage.setItem("pendingQueue",JSON.stringify(pending));
pendingCount.innerText=pending.length;
}

saveBtn.disabled=false;
saveBtn.innerText="💾 Guardar";
}

/* ================= FAVORITOS FIX ================= */
function renderFavorites(){

let map={};

data.forEach(x=>{

let key=x.Categoría+"|"+x.Descripción+"|"+x.Monto;

if(!map[key]){
map[key]={
cat:x.Categoría,
des:x.Descripción,
monto:Number(x.Monto)||0,
count:0
};
}

map[key].count++;
});

let top=Object.values(map)
.sort((a,b)=>b.count-a.count)
.slice(0,4);

favList.innerHTML="";

if(!top.length){
favList.innerHTML=`<div class="small">Aún sin favoritos</div>`;
return;
}

top.forEach(f=>{
favList.innerHTML+=`
<button class="secondary"
onclick="usarFavorito('${f.cat}','${f.des}',${f.monto})">

${f.cat}<br>
<small>${f.des}</small><br>
<small>${money(f.monto)}</small>

</button>`;
});
}

/* ================= FAVORITO ================= */
function usarFavorito(cat,des,monto){
categoria.value=cat;
descripcion.value=des;
monto.value=monto.toLocaleString("es-CO");
}

/* ================= RECURRENTES (NUEVO) ================= */
function runRecurring(){
let today=new Date().toISOString().slice(0,10);

recurring.forEach(r=>{
if(r.fecha===today){
sendRecurring(r);
}
});
}

async function sendRecurring(r){

let datos={
Fecha:r.fecha,
Categoría:r.categoria,
Descripción:r.descripcion,
Monto:Number(r.monto),
Tipo:r.categoria.includes("Ingreso")?"Ingreso":"Gasto"
};

try{
await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify(datos)
});
}catch(e){}
}

/* ================= RENDER ================= */
function render(){

renderFavorites();

/* TODO TU LOGICA ORIGINAL SIGUE IGUAL */
}

/* ================= INIT ================= */
window.addEventListener("online",syncPending);

</script>

<script>
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("./sw.js")
.then(() => console.log("SW registrado"))
.catch(console.error);
}
</script>

</body>
</html>
