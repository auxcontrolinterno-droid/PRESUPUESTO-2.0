<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Banking PRO 4.1</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
font-family:Inter;
background:linear-gradient(180deg,#070b16,#0b1020);
color:#fff;
padding:14px;
}

h1{font-size:26px;margin-bottom:6px;}

.card{
background:rgba(255,255,255,.06);
backdrop-filter:blur(14px);
padding:16px;
border-radius:16px;
margin-bottom:12px;
border:1px solid rgba(255,255,255,.08);
}

input,select,button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:8px;
}

.primary{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:#fff;
font-weight:700;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.stat{
background:rgba(255,255,255,.05);
padding:12px;
border-radius:12px;
}

.stat h3{font-size:12px;opacity:.6;}
.stat strong{font-size:18px;}

.progress{
height:10px;
background:rgba(255,255,255,.1);
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:100%;
width:0%;
background:limegreen;
transition:.3s;
}

.good{color:#22c55e;}
.mid{color:#f59e0b;}
.bad{color:#ef4444;}

.alert{
margin-top:10px;
font-size:13px;
}
</style>
</head>

<body>

<h1>🏦 Banking PRO</h1>

<!-- FORM -->
<div class="card">

<input type="date" id="fecha">
<input type="text" id="descripcion" placeholder="Descripción">
<input type="text" id="monto" placeholder="Ej: 4.000">

<select id="categoria">
<option>💰 Ingreso</option>
<option>🍔 Comida</option>
<option>🏠 Vivienda</option>
<option>🚗 Transporte</option>
<option>💡 Servicios</option>
<option>🎮 Entretenimiento</option>
<option>🏦 Ahorro</option>
</select>

<button class="primary" onclick="guardar()">Guardar movimiento</button>

</div>

<!-- PRESUPUESTO + BARRA -->
<div class="card">

<h3>💰 Presupuesto mensual</h3>

<input type="number" id="budget" placeholder="Ej: 1000000">
<button onclick="setBudget()">Guardar presupuesto</button>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="status"></div>

</div>

<!-- DASHBOARD -->
<div class="card">

<div class="grid">
<div class="stat"><h3>Ingresos</h3><strong id="ing">$0</strong></div>
<div class="stat"><h3>Gastos</h3><strong id="gas">$0</strong></div>
<div class="stat"><h3>Ahorro</h3><strong id="ah">$0</strong></div>
<div class="stat"><h3>Balance</h3><strong id="bal">$0</strong></div>
</div>

<div id="alerts"></div>

</div>

<script>

const URL="https://script.google.com/macros/s/AKfycbwXGhRN-TJxXf4hvwk_BFV52Javiqn6Lzz5ps6M1yTz9PJy-9kDcsUKJLzUY-mTS1Z2/exec";

let data=[];
let budget=localStorage.getItem("budget")||0;

/* INIT */
fecha.valueAsDate=new Date();
load();

/* LOAD */
async function load(){
let r=await fetch(URL);
data=await r.json();
render();
}

/* SAVE */
async function guardar(){

let datos={
Fecha:fecha.value,
Categoría:categoria.value,
Descripción:descripcion.value,
Monto:Number(monto.value.replace(/\./g,"")),
Tipo:categoria.value.includes("Ingreso")?"Ingreso":"Gasto"
};

await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify(datos)
});

monto.value="";
descripcion.value="";
load();
}

/* RENDER */
function render(){

let ing=0,gas=0,ah=0;

let gastoMes=0;
let hoy=new Date();

data.forEach(x=>{

let m=+x.Monto;
let d=new Date(x.Fecha);

if(x.Tipo==="Ingreso") ing+=m;
else gas+=m;

if(x.Categoría.includes("Ahorro")) ah+=m;

if(x.Tipo==="Gasto" && d.getMonth()===hoy.getMonth()){
gastoMes+=m;
}

});

document.getElementById("ing").innerText="$"+ing.toLocaleString();
document.getElementById("gas").innerText="$"+gas.toLocaleString();
document.getElementById("ah").innerText="$"+ah.toLocaleString();
document.getElementById("bal").innerText="$"+(ing-gas).toLocaleString();

/* 🔥 BARRA DE PROGRESO */
updateBudget(gastoMes);

/* 🧠 IA */
generateInsights(ing,gas);
}

/* 💰 PRESUPUESTO */
function setBudget(){
budget=document.getElementById("budget").value;
localStorage.setItem("budget",budget);
render();
}

/* 📊 PROGRESO */
function updateBudget(gasto){

if(!budget){
status.innerHTML="Define un presupuesto mensual";
return;
}

let percent=(gasto/budget)*100;
bar.style.width=Math.min(percent,100)+"%";

if(percent>=100){
status.innerHTML="🔴 Te pasaste del presupuesto";
status.className="alert bad";
}
else if(percent>=80){
status.innerHTML="⚠️ Cerca del límite";
status.className="alert mid";
}
else{
status.innerHTML="🟢 Controlado";
status.className="alert good";
}

}

/* 🧠 IA SIMPLE */
function generateInsights(ing,gas){

let alerts=document.getElementById("alerts");
alerts.innerHTML="";

if(gas>ing){
alerts.innerHTML+=`<div class="alert bad">🔴 Gastas más de lo que ingresas</div>`;
}

let promedio=gas/data.length || 0;

if(promedio>50000){
alerts.innerHTML+=`<div class="alert mid">📊 Gasto promedio alto</div>`;
}else{
alerts.innerHTML+=`<div class="alert good">🟢 Gastos controlados</div>`;
}

}

</script>

</body>
</html>
