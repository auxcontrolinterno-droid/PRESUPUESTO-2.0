<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Banking PRO AI v8</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
font-family:Inter,sans-serif;
background:linear-gradient(180deg,#070b16,#0b1020);
color:#fff;
padding:14px 14px 92px;
max-width:780px;
margin:auto;
}

/* ===== UI ===== */
.card,.header{
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(16px);
border-radius:22px;
padding:16px;
margin-bottom:12px;
}
.header{
background:linear-gradient(135deg,#111827,#1e293b);
}
.small{font-size:12px;opacity:.72}
.big{font-size:32px;font-weight:800;margin-top:4px}
.title{font-size:17px;font-weight:800;margin-bottom:10px}

.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.kpi{
background:rgba(255,255,255,.05);
padding:12px;
border-radius:14px;
}
.kpi span{
display:block;
font-size:12px;
opacity:.72;
margin-bottom:4px;
}
.kpi strong{font-size:18px}

input,select,button{
width:100%;
border:none;
outline:none;
border-radius:14px;
font-family:inherit;
}

input,select{
padding:14px;
background:#fff;
color:#111;
font-weight:600;
margin-bottom:10px;
}

button{
padding:14px;
font-weight:800;
cursor:pointer;
}

.primary{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:#fff;
}

.secondary{
background:rgba(255,255,255,.08);
color:#fff;
}

.list{
display:grid;
gap:10px;
}

.item{
background:rgba(255,255,255,.05);
padding:12px;
border-radius:14px;
border-left:4px solid transparent;
}

.ingreso{border-left-color:#22c55e}
.gasto{border-left-color:#ef4444}

.price{
font-weight:800;
margin-top:6px;
}

.small-btn{
margin-top:8px;
padding:8px 10px;
font-size:12px;
width:auto;
background:rgba(255,255,255,.08);
color:#fff;
}

.alert{
padding:10px;
border-radius:12px;
font-size:13px;
margin-top:8px;
line-height:1.45;
}
.good{background:rgba(34,197,94,.14);color:#22c55e}
.mid{background:rgba(245,158,11,.14);color:#f59e0b}
.bad{background:rgba(239,68,68,.14);color:#ef4444}

.progress{
height:10px;
background:rgba(255,255,255,.08);
border-radius:30px;
overflow:hidden;
margin-top:8px;
}
.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#22c55e,#84cc16);
transition:.35s;
}

.tab{display:none}
.tab.active{display:block}

.nav{
position:fixed;
left:0;right:0;bottom:0;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
padding:10px 12px calc(10px + env(safe-area-inset-bottom));
background:rgba(8,12,22,.95);
backdrop-filter:blur(18px);
border-top:1px solid rgba(255,255,255,.08);
max-width:780px;
margin:auto;
}
.nav button{
padding:10px 6px;
font-size:11px;
background:transparent;
color:#cbd5e1;
}
.nav button.active{
background:rgba(255,255,255,.08);
color:#fff;
}

canvas{
margin-top:10px;
background:rgba(255,255,255,.03);
border-radius:14px;
padding:8px;
}

.toast{
position:fixed;
left:50%;
bottom:88px;
transform:translateX(-50%);
background:#111827;
padding:12px 16px;
border-radius:14px;
font-size:13px;
font-weight:700;
display:none;
z-index:99;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="small" id="hello"></div>
<div class="small" id="today"></div>

<div class="small" style="margin-top:10px">Saldo disponible</div>
<div class="big" id="saldoTop">$0</div>

<div class="grid2" style="margin-top:12px">
<div class="kpi">
<span>Pendientes</span>
<strong id="pendingCount">0</strong>
</div>

<div class="kpi">
<span>Sincronizados</span>
<strong id="syncCount">0</strong>
</div>
</div>

<div class="small" style="margin-top:10px" id="lastSync">Sincronizado recién</div>
</div>

<!-- HOME -->
<section class="tab active" id="tab-home">

<div class="card">
<div class="title">➕ Nuevo movimiento</div>

<input type="date" id="fecha">
<input type="text" id="descripcion" placeholder="Descripción">
<input type="text" id="monto" placeholder="Monto (4.000)">

<select id="categoria">
<option>💰 Ingreso</option>
<option>🍔 Comida</option>
<option>🏠 Vivienda</option>
<option>🚗 Transporte</option>
<option>💡 Servicios</option>
<option>🎮 Entretenimiento</option>
<option>🏦 Ahorro</option>
</select>

<button class="primary" id="saveBtn" onclick="guardar()">💾 Guardar</button>
</div>

<div class="card">
<div class="title">📌 Resumen rápido</div>

<div class="grid2">
<div class="kpi"><span>Ingresos</span><strong id="ingresos">$0</strong></div>
<div class="kpi"><span>Gastos</span><strong id="gastos">$0</strong></div>
<div class="kpi"><span>Ahorro</span><strong id="ahorro">$0</strong></div>
<div class="kpi"><span>Movimientos</span><strong id="movs">0</strong></div>
</div>
</div>

</section>

<!-- DASHBOARD -->
<section class="tab" id="tab-dashboard">

<div class="card">
<div class="title">🤖 Coach PRO</div>
<div id="coach"></div>
</div>

<div class="card">
<div class="title">📊 Categorías</div>
<canvas id="chart1"></canvas>
</div>

<div class="card">
<div class="title">📈 Ingreso vs Gasto</div>
<canvas id="chart2"></canvas>
</div>

<div class="card">
<div class="title">🏦 Evolución ahorro</div>
<canvas id="chart3"></canvas>
</div>

</section>

<!-- METAS -->
<section class="tab" id="tab-goals">

<div class="card">
<div class="title">🎯 Nueva meta</div>

<input type="text" id="goalName" placeholder="Ej: Viaje Cartagena">
<input type="number" id="goalValue" placeholder="Monto meta">

<button class="primary" onclick="addGoal()">Guardar meta</button>
</div>

<div class="card">
<div class="title">🚀 Tus metas</div>
<div id="goalList"></div>
</div>

</section>

<!-- CALENDARIO -->
<section class="tab" id="tab-calendar">

<div class="card">
<div class="title">📆 Próximos pagos</div>

<input type="text" id="billName" placeholder="Ej: Internet">
<input type="date" id="billDate">

<button class="primary" onclick="addBill()">Guardar recordatorio</button>

<div id="billList" style="margin-top:10px"></div>
</div>

</section>

<!-- MORE -->
<section class="tab" id="tab-more">

<div class="card">
<div class="title">📋 Movimientos</div>
<div class="list" id="lista"></div>
</div>

</section>

<!-- NAV -->
<nav class="nav">
<button class="active" onclick="goTab('home',this)">🏠</button>
<button onclick="goTab('dashboard',this)">📊</button>
<button onclick="goTab('goals',this)">🎯</button>
<button onclick="goTab('calendar',this)">📆</button>
<button onclick="goTab('more',this)">📋</button>
</nav>

<div class="toast" id="toast"></div>

<script>
const URL="https://script.google.com/macros/s/AKfycbwXGhRN-TJxXf4hvwk_BFV52Javiqn6Lzz5ps6M1yTz9PJy-9kDcsUKJLzUY-mTS1Z2/exec";

let data=[];
let pending=JSON.parse(localStorage.getItem("pendingQueue")||"[]");
let goals=JSON.parse(localStorage.getItem("goals")||"[]");
let bills=JSON.parse(localStorage.getItem("bills")||"[]");

let c1,c2,c3;

fecha.valueAsDate=new Date();

init();
load();

/* INIT */
function init(){
const h=new Date().getHours();

hello.innerText=
h<12?"Buenos días ☀️":
h<19?"Buenas tardes 🌤️":
"Buenas noches 🌙";

today.innerText=new Date().toLocaleDateString("es-CO",{
weekday:"long",
day:"numeric",
month:"long"
});

pendingCount.innerText=pending.length;
renderGoals();
renderBills();
}

/* TOAST */
function toast(msg){
toastEl.innerText=msg;
toastEl.style.display="block";
setTimeout(()=>toastEl.style.display="none",2200);
}
const toastEl=document.getElementById("toast");

/* TABS */
function goTab(tab,btn){
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
document.getElementById("tab-"+tab).classList.add("active");

document.querySelectorAll(".nav button").forEach(x=>x.classList.remove("active"));
btn.classList.add("active");
}

/* LOAD */
async function load(){
try{
let r=await fetch(URL);
data=await r.json();

syncCount.innerText=data.length;
lastSync.innerText="Sincronizado recién";

render();

}catch(e){
lastSync.innerText="Sin conexión";
render();
}
}

/* SAVE */
async function guardar(){

let datos={
Fecha:fecha.value,
Categoría:categoria.value,
Descripción:descripcion.value.trim(),
Monto:Number(monto.value.replace(/\./g,"")),
Tipo:categoria.value.includes("Ingreso")?"Ingreso":"Gasto"
};

if(!datos.Descripción || datos.Monto<=0){
toast("Completa datos");
return;
}

saveBtn.disabled=true;
saveBtn.innerText="Guardando...";

if(!navigator.onLine){
pending.push(datos);
localStorage.setItem("pendingQueue",JSON.stringify(pending));
pendingCount.innerText=pending.length;
toast("☁ Pendiente");
saveBtn.disabled=false;
saveBtn.innerText="💾 Guardar";
return;
}

try{
await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify(datos)
});

descripcion.value="";
monto.value="";

toast("✔ Guardado");
await load();

}catch(e){
toast("Error");
}

saveBtn.disabled=false;
saveBtn.innerText="💾 Guardar";
}

/* DELETE */
async function borrar(id){

if(!confirm("¿Eliminar movimiento?")) return;

data=data.filter(x=>String(x.ID)!==String(id));
render();

await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify({action:"delete",ID:id})
});

toast("🗑 Eliminado");
}

/* RENDER */
function render(){

lista.innerHTML="";

let ing=0,gas=0,ah=0;
let cats={};
let ahorroLine=[];

data.slice().reverse().forEach(x=>{

let m=Number(x.Monto)||0;

if(x.Tipo==="Ingreso") ing+=m;
else gas+=m;

if(String(x.Categoría).includes("Ahorro")) ah+=m;

if(x.Tipo==="Gasto"){
cats[x.Categoría]=(cats[x.Categoría]||0)+m;
}

ahorroLine.push(ah);

lista.innerHTML+=`
<div class="item ${x.Tipo==="Ingreso"?"ingreso":"gasto"}">
<div>${x.Categoría} - ${x.Descripción}</div>
<div class="price">$${m.toLocaleString("es-CO")}</div>
<button class="small-btn" onclick="borrar('${x.ID}')">🗑️ Borrar</button>
</div>`;
});

saldoTop.innerText="$"+(ing-gas).toLocaleString("es-CO");
ingresos.innerText="$"+ing.toLocaleString("es-CO");
gastos.innerText="$"+gas.toLocaleString("es-CO");
ahorro.innerText="$"+ah.toLocaleString("es-CO");
movs.innerText=data.length;

renderCoach(ing,gas,ah,cats);
renderCharts(ing,gas,ahorroLine,cats);
renderGoals();
}

/* COACH */
function renderCoach(ing,gas,ah,cats){

let top=Object.entries(cats).sort((a,b)=>b[1]-a[1])[0];
let libre=ing-gas;

let html="";

html+=gas>ing
?'<div class="alert bad">🔴 Gastas más de lo que ingresas.</div>'
:'<div class="alert good">🟢 Balance saludable.</div>';

if(top){
html+=`<div class="alert mid">📌 Mayor gasto: ${top[0]} ($${top[1].toLocaleString("es-CO")})</div>`;
}

html+=`<div class="alert good">🏦 Ahorro actual: $${ah.toLocaleString("es-CO")}</div>`;

html+=`<div class="alert mid">📈 Si mantienes ritmo cerrarás con $${libre.toLocaleString("es-CO")} libres.</div>`;

coach.innerHTML=html;
}

/* CHARTS */
function renderCharts(ing,gas,line,cats){

[c1,c2,c3].forEach(x=>x&&x.destroy());

c1=new Chart(chart1,{
type:"doughnut",
data:{
labels:Object.keys(cats),
datasets:[{data:Object.values(cats)}]
}
});

c2=new Chart(chart2,{
type:"bar",
data:{
labels:["Ingresos","Gastos"],
datasets:[{data:[ing,gas]}]
}
});

c3=new Chart(chart3,{
type:"line",
data:{
labels:line.map((_,i)=>i+1),
datasets:[{
label:"Ahorro",
data:line
}]
}
});
}

/* GOALS */
function addGoal(){

let name=goalName.value.trim();
let val=Number(goalValue.value);

if(!name || val<=0) return;

goals.push({name,val});
localStorage.setItem("goals",JSON.stringify(goals));

goalName.value="";
goalValue.value="";

renderGoals();
toast("🎯 Meta creada");
}

function renderGoals(){

let ahorroActual=document.getElementById("ahorro").innerText
.replace(/\$/g,"")
.replace(/\./g,"")
.replace(/,/g,"");

ahorroActual=Number(ahorroActual)||0;

goalList.innerHTML="";

goals.forEach((g,i)=>{

let p=Math.min((ahorroActual/g.val)*100,100);

goalList.innerHTML+=`
<div class="item">
<div><strong>${g.name}</strong></div>
<div class="small">$${ahorroActual.toLocaleString("es-CO")} / $${g.val.toLocaleString("es-CO")}</div>
<div class="progress"><div class="bar" style="width:${p}%"></div></div>
<button class="small-btn" onclick="delGoal(${i})">🗑️</button>
</div>`;
});
}

function delGoal(i){
goals.splice(i,1);
localStorage.setItem("goals",JSON.stringify(goals));
renderGoals();
}

/* BILLS */
function addBill(){

let n=billName.value.trim();
let d=billDate.value;

if(!n || !d) return;

bills.push({n,d});
localStorage.setItem("bills",JSON.stringify(bills));

billName.value="";
billDate.value="";

renderBills();
toast("📆 Recordatorio creado");
}

function renderBills(){

billList.innerHTML="";

bills.forEach((b,i)=>{

billList.innerHTML+=`
<div class="item">
<div><strong>${b.n}</strong></div>
<div>${b.d}</div>
<button class="small-btn" onclick="delBill(${i})">🗑️</button>
</div>`;
});
}
function delBill(i){
bills.splice(i,1);
localStorage.setItem("bills",JSON.stringify(bills));
renderBills();
}
</script>

</body>
</html>
