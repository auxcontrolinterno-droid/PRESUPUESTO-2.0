<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Banking PRO AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:Inter,sans-serif;
background:linear-gradient(180deg,#070b16,#0b1020);
color:#fff;
padding:14px;
max-width:720px;
margin:auto;
}

/* ================= HEADER PREMIUM ================= */
.header{
background:linear-gradient(135deg,#111827,#1e293b);
border:1px solid rgba(255,255,255,.08);
padding:18px;
border-radius:22px;
margin-bottom:14px;
box-shadow:0 12px 30px rgba(0,0,0,.25);
}

.header-top{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
margin-bottom:12px;
}

.greeting{
font-size:14px;
opacity:.8;
}

.date{
font-size:12px;
opacity:.65;
}

.balance-label{
font-size:13px;
opacity:.75;
margin-bottom:4px;
}

.balance{
font-size:32px;
font-weight:800;
letter-spacing:-1px;
}

.variation{
margin-top:6px;
font-size:13px;
font-weight:700;
color:#22c55e;
}

/* ================= STATUS ================= */
.sync-bar{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
font-size:12px;
opacity:.85;
margin:10px 2px 14px;
}

.online{color:#22c55e;}
.offline{color:#ef4444;}

/* ================= CARDS ================= */
.card{
background:rgba(255,255,255,.06);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,.08);
padding:14px;
border-radius:18px;
margin-bottom:12px;
box-shadow:0 10px 24px rgba(0,0,0,.14);
}

.section-title{
font-size:18px;
font-weight:800;
margin-bottom:12px;
}

/* ================= FORM ================= */
.field{
margin-bottom:12px;
}

.field label{
display:block;
font-size:12px;
opacity:.75;
margin-bottom:6px;
}

input,select,button{
width:100%;
border:none;
outline:none;
border-radius:14px;
font-family:inherit;
}

input,select{
padding:14px;
background:rgba(255,255,255,.95);
color:#111;
font-size:14px;
font-weight:600;
}

button{
padding:14px;
font-size:15px;
font-weight:800;
cursor:pointer;
transition:.18s ease;
}

button:active{
transform:scale(.98);
}

.primary{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:#fff;
box-shadow:0 12px 24px rgba(37,99,235,.25);
}

.primary:disabled{
opacity:.65;
cursor:not-allowed;
}

/* ================= PROGRESS ================= */
.progress{
height:10px;
background:rgba(255,255,255,.08);
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#22c55e,#84cc16);
transition:.35s;
}

/* ================= LISTA ================= */
.list{
display:grid;
gap:10px;
}

.item{
background:rgba(255,255,255,.05);
padding:12px;
border-radius:14px;
border-left:4px solid transparent;
animation:fadeIn .25s ease;
}

.ingreso{border-left-color:#22c55e;}
.gasto{border-left-color:#ef4444;}

.price{
font-weight:800;
margin-top:6px;
font-size:15px;
}

.actions{
margin-top:8px;
}

.small-btn{
padding:8px 10px;
font-size:12px;
border-radius:10px;
background:rgba(255,255,255,.12);
color:#fff;
width:auto;
}

/* ================= ALERTS ================= */
.alert{
padding:10px;
border-radius:12px;
font-size:13px;
margin-top:8px;
line-height:1.4;
}

.good{
background:rgba(34,197,94,.14);
color:#22c55e;
}

.mid{
background:rgba(245,158,11,.14);
color:#f59e0b;
}

.bad{
background:rgba(239,68,68,.14);
color:#ef4444;
}

/* ================= TOAST ================= */
.toast{
position:fixed;
left:50%;
bottom:22px;
transform:translateX(-50%) translateY(30px);
background:#111827;
color:#fff;
padding:12px 16px;
border-radius:14px;
font-size:13px;
font-weight:700;
opacity:0;
pointer-events:none;
transition:.28s;
z-index:999;
border:1px solid rgba(255,255,255,.08);
}

.toast.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

/* ================= ANIMATIONS ================= */
@keyframes fadeIn{
from{opacity:0;transform:translateY(8px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<!-- HEADER PREMIUM -->
<div class="header">
<div class="header-top">
<div>
<div class="greeting" id="greeting">Hola 👋</div>
<div class="date" id="todayDate"></div>
</div>
<div id="netState" class="online">🟢 Online</div>
</div>

<div class="balance-label">Saldo disponible</div>
<div class="balance" id="mainBalance">$0</div>
<div class="variation" id="variation">+0% este mes</div>
</div>

<!-- BARRA CONFIANZA -->
<div class="sync-bar">
<div id="syncText">Sincronizado recién</div>
<div id="pendingText">Pendientes: 0</div>
</div>

<!-- NUEVO MOVIMIENTO -->
<div class="card">
<div class="section-title">➕ Nuevo movimiento</div>

<div class="field">
<label>Fecha</label>
<input type="date" id="fecha">
</div>

<div class="field">
<label>Descripción</label>
<input type="text" id="descripcion" placeholder="Ej: Almuerzo, Nómina...">
</div>

<div class="field">
<label>Monto</label>
<input type="text" id="monto" placeholder="Ej: 4.000">
</div>

<div class="field">
<label>Categoría</label>
<select id="categoria">
<option>💰 Ingreso</option>
<option>🍔 Comida</option>
<option>🏠 Vivienda</option>
<option>🚗 Transporte</option>
<option>💡 Servicios</option>
<option>🎮 Entretenimiento</option>
<option>🏦 Ahorro</option>
</select>
</div>

<button class="primary" id="saveBtn" onclick="guardar()">
💾 Guardar movimiento
</button>
</div>

<!-- PRESUPUESTO -->
<div class="card">
<div class="section-title">💰 Presupuesto mensual</div>

<input type="number" id="budget" placeholder="Ej: 1000000">

<button class="primary" style="margin-top:10px;" onclick="setBudget()">
Guardar presupuesto
</button>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="status"></div>
</div>

<!-- IA -->
<div class="card">
<div class="section-title">🧠 Análisis inteligente</div>
<div id="insights"></div>
</div>

<!-- MOVIMIENTOS -->
<div class="card">
<div class="section-title">📋 Movimientos</div>
<div class="list" id="lista"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const URL="https://script.google.com/macros/s/AKfycbwXGhRN-TJxXf4hvwk_BFV52Javiqn6Lzz5ps6M1yTz9PJy-9kDcsUKJLzUY-mTS1Z2/exec";

let data=[];
let budget=localStorage.getItem("budget")||0;

/* INIT */
fecha.valueAsDate=new Date();
budget && (document.getElementById("budget").value=budget);

setHeaderClock();
setNetworkUI();
load();

/* ================= UI HELPERS ================= */

function toast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2200);
}

function setHeaderClock(){
const h=new Date().getHours();
let txt="Hola 👋";

if(h<12) txt="Buenos días ☀️";
else if(h<19) txt="Buenas tardes 🌤️";
else txt="Buenas noches 🌙";

document.getElementById("greeting").innerText=txt;

document.getElementById("todayDate").innerText=
new Date().toLocaleDateString("es-CO",{
weekday:"long",
day:"numeric",
month:"long"
});
}

function setNetworkUI(){
const online=navigator.onLine;
document.getElementById("netState").innerHTML=
online ? "🟢 Online":"🔴 Offline";

document.getElementById("netState").className=
online ? "online":"offline";
}

window.addEventListener("online",()=>{
setNetworkUI();
toast("🟢 Conexión restablecida");
load();
});

window.addEventListener("offline",()=>{
setNetworkUI();
toast("🔴 Sin conexión");
});

/* ================= LOAD ================= */

async function load(){
try{
const r=await fetch(URL);
data=await r.json();
document.getElementById("syncText").innerText="Sincronizado recién";
}catch(e){
document.getElementById("syncText").innerText="Sin conexión";
}
render();
}

/* ================= GUARDAR ================= */

async function guardar(){

const btn=document.getElementById("saveBtn");

let datos={
Fecha:fecha.value,
Categoría:categoria.value,
Descripción:descripcion.value.trim(),
Monto:Number(monto.value.replace(/\./g,"")),
Tipo:categoria.value.includes("Ingreso")?"Ingreso":"Gasto"
};

if(!datos.Descripción || datos.Monto<=0){
toast("Completa los datos");
return;
}

btn.disabled=true;
btn.innerText="Guardando...";

try{
await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify(datos)
});

toast("✔ Movimiento guardado");

descripcion.value="";
monto.value="";

await load();

}catch(e){
toast("❌ Error al guardar");
}

btn.disabled=false;
btn.innerText="💾 Guardar movimiento";
}

/* ================= BORRAR ================= */

async function borrar(id){

if(!confirm("¿Eliminar movimiento?")) return;

data=data.filter(x=>String(x.ID)!==String(id));
render();

toast("🗑 Movimiento eliminado");

try{
await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify({action:"delete",ID:id})
});
}catch(e){}
}

/* ================= RENDER ================= */

function render(){

let lista=document.getElementById("lista");
lista.innerHTML="";

let ingresos=0;
let gastos=0;
let ahorro=0;
let gastoMes=0;

const hoy=new Date();

data.slice().reverse().forEach(x=>{

const m=Number(x.Monto)||0;
const f=new Date(x.Fecha);

if(x.Tipo==="Ingreso") ingresos+=m;
else gastos+=m;

if(String(x.Categoría).includes("Ahorro")) ahorro+=m;

if(
x.Tipo==="Gasto" &&
f.getMonth()===hoy.getMonth() &&
f.getFullYear()===hoy.getFullYear()
){
gastoMes+=m;
}

lista.innerHTML+=`
<div class="item ${x.Tipo==="Ingreso"?"ingreso":"gasto"}">
<div>${x.Categoría} - ${x.Descripción}</div>
<div class="price">$${m.toLocaleString("es-CO")}</div>
<div class="actions">
<button class="small-btn" onclick="borrar('${x.ID}')">🗑️ Borrar</button>
</div>
</div>
`;

});

/* HEADER */
const saldo=ingresos-gastos;
document.getElementById("mainBalance").innerText=
"$"+saldo.toLocaleString("es-CO");

let variacion=ingresos?((saldo/ingresos)*100):0;
document.getElementById("variation").innerText=
(variacion>=0?"+":"")+variacion.toFixed(0)+"% este mes";

/* PENDIENTES */
document.getElementById("pendingText").innerText="Pendientes: 0";

/* RESTO */
updateBudget(gastoMes);
generateInsights(ingresos,gastos,ahorro);
predictiveAI(ingresos,gastos);
smartCoach(ingresos,gastos,ahorro);
}

/* ================= PRESUPUESTO ================= */

function setBudget(){
budget=Number(document.getElementById("budget").value)||0;
localStorage.setItem("budget",budget);
render();
toast("✔ Presupuesto guardado");
}

function updateBudget(gasto){

if(!budget){
status.innerHTML="Define un presupuesto mensual";
bar.style.width="0%";
return;
}

let percent=(gasto/budget)*100;
bar.style.width=Math.min(percent,100)+"%";

if(percent>=100){
status.innerHTML='<div class="alert bad">🔴 Te pasaste del presupuesto</div>';
}else if(percent>=80){
status.innerHTML='<div class="alert mid">⚠️ Cerca del límite</div>';
}else{
status.innerHTML='<div class="alert good">🟢 Bajo control</div>';
}
}

/* ================= IA ================= */

function generateInsights(ing,gas,ah){

let promedio=data.length ? gas/data.length : 0;

insights.innerHTML=`
<div class="alert good">💰 Ingresos: $${ing.toLocaleString("es-CO")}</div>
<div class="alert mid">💸 Gastos: $${gas.toLocaleString("es-CO")}</div>
<div class="alert good">🏦 Ahorro actual: $${ah.toLocaleString("es-CO")}</div>
<div class="alert mid">📊 Promedio gasto: $${promedio.toFixed(0)}</div>
`;
}

function predictiveAI(ing,gas){

let hoy=new Date();
let diasMes=new Date(hoy.getFullYear(),hoy.getMonth()+1,0).getDate();
let diaActual=hoy.getDate();

let gastoDiario=gas/diaActual;
let proyeccion=gastoDiario*diasMes;
let balance=ing-proyeccion;

let html=`
<div class="alert good">📅 Gasto diario: $${gastoDiario.toFixed(0)}</div>
<div class="alert mid">🔮 Proyección fin de mes: $${proyeccion.toLocaleString("es-CO")}</div>
`;

if(balance<0){
html+=`<div class="alert bad">🔴 Riesgo financiero detectado</div>`;
}else{
html+=`<div class="alert good">🟢 Proyección saludable</div>`;
}

insights.innerHTML+=html;
}

function smartCoach(ing,gas,ah){

let comida=0,transporte=0,entretenimiento=0;

data.forEach(x=>{
let m=Number(x.Monto)||0;
if(String(x.Categoría).includes("Comida")) comida+=m;
if(String(x.Categoría).includes("Transporte")) transporte+=m;
if(String(x.Categoría).includes("Entretenimiento")) entretenimiento+=m;
});

let meta=0;

if(ing<1000000) meta=ing*.10;
else if(ing<3000000) meta=ing*.20;
else meta=ing*.30;

let categorias=[
["🍔 Comida",comida],
["🚗 Transporte",transporte],
["🎮 Entretenimiento",entretenimiento]
].sort((a,b)=>b[1]-a[1]);

let top=categorias[0];
let ahorroPotencial=top[1]*.15;

let html=`
<div class="alert mid">🎯 Meta sugerida ahorro: $${meta.toLocaleString("es-CO")}</div>
<div class="alert good">📌 Prioridad actual: ${top[0]}</div>
<div class="alert mid">💡 Si reduces ${top[0]} 15%, ahorrarías $${ahorroPotencial.toLocaleString("es-CO")}</div>
`;

if(ah<meta){
html+=`<div class="alert bad">⚠️ Vas por debajo de la meta</div>`;
}else{
html+=`<div class="alert good">🟢 Meta de ahorro encaminada</div>`;
}

insights.innerHTML+=html;
}
</script>

</body>
</html>
