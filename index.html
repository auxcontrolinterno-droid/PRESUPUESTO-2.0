<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Banking PRO Fase 2</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
font-family:Inter;
background:#0b1020;
color:#fff;
padding:14px;
}

.card{
background:rgba(255,255,255,.06);
padding:14px;
border-radius:14px;
margin-bottom:10px;
}

input,button{
width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
border:none;
}

.primary{background:#2563eb;color:#fff;font-weight:700;}

.progress{
height:10px;
background:rgba(255,255,255,.1);
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:100%;
width:0%;
background:limegreen;
transition:.3s;
}

.warning{
color:#f59e0b;
font-weight:700;
margin-top:8px;
}

.danger{
color:#ef4444;
font-weight:700;
margin-top:8px;
}

.list{
margin-top:12px;
display:grid;
gap:10px;
}

.item{
background:rgba(255,255,255,.05);
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<h1>🏦 Banking PRO - Fase 2</h1>

<!-- 💰 PRESUPUESTO -->
<div class="card">
<h3>💰 Presupuesto mensual</h3>

<input type="number" id="budget" placeholder="Ej: 1000000">
<button class="primary" onclick="setBudget()">Guardar presupuesto</button>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="status"></div>
</div>

<!-- MOVIMIENTOS -->
<div class="card">
<h3>📊 Movimientos</h3>
<div class="list" id="lista"></div>
</div>

<script>

const URL="https://script.google.com/macros/s/AKfycbwXGhRN-TJxXf4hvwk_BFV52Javiqn6Lzz5ps6M1yTz9PJy-9kDcsUKJLzUY-mTS1Z2/exec";

let data=[];
let budget=localStorage.getItem("budget")||0;

/* INIT */
load();

/* LOAD */
async function load(){
let r=await fetch(URL);
data=await r.json();
render();
}

/* RENDER */
function render(){

let lista=document.getElementById("lista");
lista.innerHTML="";

let gastoMes=0;
let hoy=new Date();

data.forEach(x=>{

let d=new Date(x.Fecha);
if(d.getMonth()===hoy.getMonth() && x.Tipo==="Gasto"){
gastoMes+=Number(x.Monto);
}

lista.innerHTML+=`
<div class="item">
${x.Categoría} - ${x.Descripción}
<br><b>$${Number(x.Monto).toLocaleString()}</b>
</div>
`;

});

/* 📊 PROGRESO */
if(budget>0){

let percent=(gastoMes/budget)*100;
document.getElementById("bar").style.width=Math.min(percent,100)+"%";

let status=document.getElementById("status");

if(percent>=100){
status.innerHTML="🔴 Te pasaste del presupuesto";
status.className="danger";
}else if(percent>=80){
status.innerHTML="⚠️ Cuidado, estás cerca del límite";
status.className="warning";
}else{
status.innerHTML="🟢 Vas bien este mes";
status.className="";
}

}else{
document.getElementById("status").innerHTML="Define un presupuesto mensual";
}

}

/* SET BUDGET */
function setBudget(){
budget=document.getElementById("budget").value;
localStorage.setItem("budget",budget);
render();
}

/* INIT VALUE */
if(budget){
document.getElementById("budget").value=budget;
}

</script>

</body>
</html>
