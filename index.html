<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Presupuesto PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:radial-gradient(circle at top,#1a2a4a,#070b16);
color:#fff;
padding:14px;
}

h1{font-size:32px;font-weight:800;}

.sub{opacity:.7;margin-bottom:14px;font-size:13px;}

button,input,select{
font-family:'Inter',sans-serif;
}

.top{
display:grid;
grid-template-columns:1fr;
gap:12px;
margin-bottom:14px;
}

.card{
background:rgba(255,255,255,.07);
backdrop-filter:blur(12px);
padding:16px;
border-radius:18px;
border:1px solid rgba(255,255,255,.08);
}

.card span{font-size:12px;opacity:.7;}
.card strong{font-size:22px;}

.panel{
background:rgba(255,255,255,.06);
backdrop-filter:blur(14px);
padding:16px;
border-radius:24px;
border:1px solid rgba(255,255,255,.08);
}

input,select,button{
width:100%;
padding:14px;
border-radius:12px;
border:none;
outline:none;
font-size:15px;
}

input,select{background:#fff;color:#111;}

.row{display:grid;gap:10px;}

.primary{
background:linear-gradient(135deg,#0ea5e9,#2563eb);
color:#fff;
font-weight:800;
}

.secondary{
background:rgba(255,255,255,.15);
color:#fff;
font-weight:700;
}

.list{margin-top:14px;display:grid;gap:10px;}

.item{
background:rgba(255,255,255,.06);
padding:14px;
border-radius:16px;
position:relative;
}

.item.ingreso{border-left:4px solid #22c55e;}
.item.gasto{border-left:4px solid #ef4444;}

.price{font-weight:800;margin-top:6px;}

.actions{
margin-top:8px;
display:flex;
gap:8px;
}

.actions button{
padding:6px 10px;
font-size:12px;
border-radius:8px;
}

#dashboard{display:none;}

canvas{background:rgba(255,255,255,.04);border-radius:14px;padding:10px;margin-top:10px;}

@media(min-width:700px){
.top{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>

<body>

<!-- ================= APP ================= -->
<div id="app">

<h1>💸 Presupuesto PRO</h1>
<div class="sub">control financiero inteligente</div>

<div class="top">

<div class="card">
<span>Hoy gastado</span>
<strong id="hoy">$0</strong>
</div>

<div class="card">
<span>Pendientes offline</span>
<strong id="pendientes">0</strong>
</div>

<div class="card">
<span>Registros</span>
<strong id="registros">0</strong>
</div>

</div>

<div class="panel">

<form id="formulario">

<input type="date" id="fecha">
<input type="text" id="descripcion" placeholder="Descripción">

<div class="row">
<input type="text" id="monto" placeholder="Monto">

<select id="categoria">
<option>💰 Ingreso</option>
<option>🏠 Vivienda</option>
<option>🍔 Comida</option>
<option>🚗 Transporte</option>
<option>💡 Servicios</option>
<option>🎮 Entretenimiento</option>
<option>🏦 Ahorro</option>
</select>
</div>

<button class="primary" type="submit">Guardar</button>
</form>

<div class="list" id="lista"></div>

</div>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard">

<button class="secondary" onclick="back()">⬅ Volver</button>

<h1>📊 Dashboard</h1>

<div class="top">
<div class="card"><span>Ingresos</span><strong id="ing">$0</strong></div>
<div class="card"><span>Gastos</span><strong id="gas">$0</strong></div>
<div class="card"><span>Balance</span><strong id="bal">$0</strong></div>
</div>

<canvas id="chartMes"></canvas>
<canvas id="chartCat"></canvas>
<canvas id="chartHist"></canvas>

</div>

<script>

const URL="https://script.google.com/macros/s/AKfycbwXGhRN-TJxXf4hvwk_BFV52Javiqn6Lzz5ps6M1yTz9PJy-9kDcsUKJLzUY-mTS1Z2/exec";

let data=[];
let cola=JSON.parse(localStorage.getItem("cola"))||[];

/* ================= NAV ================= */
function goDash(){
document.getElementById("app").style.display="none";
document.getElementById("dashboard").style.display="block";
load();
}

function back(){
document.getElementById("dashboard").style.display="none";
document.getElementById("app").style.display="block";
}

/* ================= LOAD ================= */
async function load(){
let r=await fetch(URL);
data=await r.json();
render();
dash();
}

/* ================= RENDER APP ================= */
function render(){

document.getElementById("registros").innerText=data.length;
document.getElementById("pendientes").innerText=cola.length;

let lista=document.getElementById("lista");
lista.innerHTML="";

let hoy=new Date().toISOString().slice(0,10);
let gastoHoy=0;

data.slice().reverse().forEach(x=>{

if(x.Fecha===hoy && x.Tipo==="Gasto"){
gastoHoy+=+x.Monto;
}

lista.innerHTML+=`
<div class="item ${x.Tipo==="Ingreso"?"ingreso":"gasto"}">
<b>${x.Categoría}</b><br>
${x.Descripción}
<div class="price">$${Number(x.Monto).toLocaleString()}</div>

<div class="actions">
<button onclick="del('${x.ID}')">🗑</button>
</div>

</div>
`;
});

document.getElementById("hoy").innerText="$"+gastoHoy.toLocaleString();
}

/* ================= DELETE ================= */
async function del(id){
await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({action:"delete",ID:id})
});
load();
}

/* ================= SAVE ================= */
async function send(d){
return fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify(d)
});
}

document.getElementById("formulario").addEventListener("submit",async e=>{
e.preventDefault();

let d={
Fecha:document.getElementById("fecha").value,
Descripción:document.getElementById("descripcion").value,
Monto:document.getElementById("monto").value,
Categoría:document.getElementById("categoria").value,
Tipo:document.getElementById("categoria").value.includes("Ingreso")?"Ingreso":"Gasto"
};

await send(d);
load();
});

/* ================= DASHBOARD ================= */
function dash(){

let i=0,g=0;

data.forEach(x=>{
if(x.Tipo==="Ingreso") i+=+x.Monto;
else g+=+x.Monto;
});

document.getElementById("ing").innerText="$"+i.toLocaleString();
document.getElementById("gas").innerText="$"+g.toLocaleString();
document.getElementById("bal").innerText="$"+(i-g).toLocaleString();

/* gráfico mes */
new Chart(document.getElementById("chartMes"),{
type:"doughnut",
data:{labels:["Ingresos","Gastos"],datasets:[{data:[i,g]}]}
});

/* categorías */
let cat={};
data.forEach(x=>{
if(!cat[x.Categoría])cat[x.Categoría]=0;
cat[x.Categoría]+=+x.Monto;
});

new Chart(document.getElementById("chartCat"),{
type:"pie",
data:{labels:Object.keys(cat),datasets:[{data:Object.values(cat)}]}
});

/* historial */
let meses={};
data.forEach(x=>{
let m=x.Fecha.slice(0,7);
if(!meses[m])meses[m]=0;
meses[m]+= (x.Tipo==="Ingreso"?1:-1)*x.Monto;
});

new Chart(document.getElementById("chartHist"),{
type:"bar",
data:{labels:Object.keys(meses),datasets:[{data:Object.values(meses)}]}
});

}

/* ================= INIT ================= */
document.getElementById("fecha").valueAsDate=new Date();
load();

</script>

</body>
</html>
