<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Banking PRO AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
font-family:Inter;
background:linear-gradient(180deg,#070b16,#0b1020);
color:#fff;
padding:14px;
}

h1{font-size:24px;margin-bottom:10px;}

.card{
background:rgba(255,255,255,.06);
backdrop-filter:blur(14px);
padding:14px;
border-radius:14px;
margin-bottom:10px;
border:1px solid rgba(255,255,255,.08);
}

input,select,button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:8px;
font-size:14px;
}

.primary{
background:#2563eb;
color:#fff;
font-weight:700;
}

.list{
display:grid;
gap:10px;
margin-top:10px;
}

.item{
background:rgba(255,255,255,.05);
padding:10px;
border-radius:10px;
border-left:3px solid transparent;
}

.ingreso{border-left-color:#22c55e;}
.gasto{border-left-color:#ef4444;}

.price{
font-weight:800;
margin-top:4px;
}

.actions{
margin-top:6px;
}

.actions button{
padding:6px 10px;
font-size:12px;
background:rgba(255,255,255,.15);
color:#fff;
border-radius:8px;
border:none;
}

/* PROGRESS */
.progress{
height:10px;
background:rgba(255,255,255,.1);
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:100%;
width:0%;
background:limegreen;
transition:.3s;
}

/* ALERTAS */
.alert{
margin-top:8px;
font-size:13px;
padding:8px;
border-radius:10px;
}

.good{background:rgba(34,197,94,.15);color:#22c55e;}
.mid{background:rgba(245,158,11,.15);color:#f59e0b;}
.bad{background:rgba(239,68,68,.15);color:#ef4444;}
</style>
</head>

<body>

<h1>🏦 Banking PRO AI</h1>

<!-- FORM -->
<div class="card">

<input type="date" id="fecha">
<input type="text" id="descripcion" placeholder="Descripción">
<input type="text" id="monto" placeholder="Ej: 4.000">

<select id="categoria">
<option>💰 Ingreso</option>
<option>🍔 Comida</option>
<option>🏠 Vivienda</option>
<option>🚗 Transporte</option>
<option>💡 Servicios</option>
<option>🎮 Entretenimiento</option>
<option>🏦 Ahorro</option>
</select>

<button class="primary" onclick="guardar()">Guardar movimiento</button>

</div>

<!-- PRESUPUESTO -->
<div class="card">

<h3>💰 Presupuesto mensual</h3>

<input type="number" id="budget">
<button onclick="setBudget()">Guardar presupuesto</button>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="status"></div>

</div>

<!-- DASHBOARD -->
<div class="card">

<div id="insights"></div>

</div>

<!-- MOVIMIENTOS -->
<div class="card">
<h3>📋 Movimientos</h3>
<div class="list" id="lista"></div>
</div>

<script>

const URL="https://script.google.com/macros/s/AKfycbwXGhRN-TJxXf4hvwk_BFV52Javiqn6Lzz5ps6M1yTz9PJy-9kDcsUKJLzUY-mTS1Z2/exec";

let data=[];
let budget=localStorage.getItem("budget")||0;

/* INIT */
fecha.valueAsDate=new Date();
load();

/* LOAD */
async function load(){
let r=await fetch(URL);
data=await r.json();
render();
}

/* SAVE */
async function guardar(){

let datos={
Fecha:fecha.value,
Categoría:categoria.value,
Descripción:descripcion.value,
Monto:Number(monto.value.replace(/\./g,"")),
Tipo:categoria.value.includes("Ingreso")?"Ingreso":"Gasto"
};

await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify(datos)
});

monto.value="";
descripcion.value="";
load();
}

/* DELETE */
function borrar(id){

if(!confirm("Eliminar movimiento?")) return;

data=data.filter(x=>x.ID!=id);
render();

fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify({action:"delete",ID:id})
});

}

/* RENDER */
function render(){

let lista=document.getElementById("lista");
lista.innerHTML="";

let ing=0,gas=0,ah=0;
let gastoMes=0;
let hoy=new Date();

data.forEach(x=>{

let m=+x.Monto;
let d=new Date(x.Fecha);

if(x.Tipo==="Ingreso") ing+=m;
else gas+=m;

if(x.Categoría.includes("Ahorro")) ah+=m;

if(x.Tipo==="Gasto" && d.getMonth()===hoy.getMonth()){
gastoMes+=m;
}

lista.innerHTML+=`
<div class="item ${x.Tipo==="Ingreso"?"ingreso":"gasto"}">
${x.Categoría} - ${x.Descripción}
<div class="price">$${m.toLocaleString()}</div>

<div class="actions">
<button onclick="borrar('${x.ID}')">🗑️ borrar</button>
</div>

</div>
`;

});

updateBudget(gastoMes);
generateInsights(ing,gas,ah);
predictiveAI(ing,gas);
}

/* PRESUPUESTO */
function setBudget(){
budget=document.getElementById("budget").value;
localStorage.setItem("budget",budget);
render();
}

/* BARRA */
function updateBudget(gasto){

if(!budget){
status.innerHTML="Define un presupuesto mensual";
return;
}

let percent=(gasto/budget)*100;
bar.style.width=Math.min(percent,100)+"%";

if(percent>=100){
status.innerHTML="🔴 Te pasaste del presupuesto";
status.className="alert bad";
}
else if(percent>=80){
status.innerHTML="⚠️ Cerca del límite";
status.className="alert mid";
}
else{
status.innerHTML="🟢 Controlado";
status.className="alert good";
}

}

/* 🧠 FASE 4 */
function generateInsights(ing,gas,ah){

let ins=document.getElementById("insights");
ins.innerHTML="";

let promedio=gas/data.length || 0;

ins.innerHTML+=`<div class="alert good">💰 Ingresos: $${ing.toLocaleString()}</div>`;
ins.innerHTML+=`<div class="alert mid">💸 Gastos: $${gas.toLocaleString()}</div>`;
ins.innerHTML+=`<div class="alert good">🏦 Ahorro: $${ah.toLocaleString()}</div>`;
ins.innerHTML+=`<div class="alert mid">📊 Promedio gasto: $${promedio.toFixed(0)}</div>`;
}

/* 🔮 FASE 5 PREDICTIVA */
function predictiveAI(ing,gas){

let hoy=new Date();
let diasMes=new Date(hoy.getFullYear(),hoy.getMonth()+1,0).getDate();
let diaActual=hoy.getDate();

let gastoDiario=gas/diaActual;
let proyeccion=gastoDiario*diasMes;
let balance=ing-proyeccion;

let html="";

html+=`<div class="alert good">📊 Gasto diario: $${gastoDiario.toFixed(0)}</div>`;
html+=`<div class="alert mid">🔮 Proyección mes: $${proyeccion.toLocaleString()}</div>`;

if(balance<0){
html+=`<div class="alert bad">🔴 ALERTA: te quedarías sin dinero este mes</div>`;
}
else if(balance<ing*0.2){
html+=`<div class="alert mid">⚠️ Riesgo de sobre gasto</div>`;
}
else{
html+=`<div class="alert good">🟢 Finanzas saludables proyectadas</div>`;
}

document.getElementById("insights").innerHTML+=html;
}

</script>

</body>
</html>
