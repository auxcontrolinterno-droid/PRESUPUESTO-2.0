<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Presupuesto PRO Banking</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{
font-family:'Inter',sans-serif;
background:radial-gradient(circle at top,#0f172a,#05070f);
color:#fff;
padding:14px;
}

h1{font-size:30px;font-weight:800;margin-bottom:6px;}
.sub{opacity:.6;margin-bottom:14px;font-size:13px;}

button,input,select{font-family:'Inter',sans-serif;}

.top{
display:grid;
grid-template-columns:1fr;
gap:12px;
margin-bottom:16px;
}

.card{
background:rgba(255,255,255,.06);
backdrop-filter:blur(14px);
padding:16px;
border-radius:18px;
border:1px solid rgba(255,255,255,.08);
}

.card span{font-size:12px;opacity:.6;}
.card strong{font-size:22px;font-weight:800;}

.panel{
background:rgba(255,255,255,.05);
backdrop-filter:blur(14px);
padding:14px;
border-radius:22px;
border:1px solid rgba(255,255,255,.08);
}

form{display:grid;gap:10px;}

input,select,button{
width:100%;
padding:14px;
font-size:15px;
border:none;
border-radius:12px;
outline:none;
}

input,select{background:#fff;color:#111;}

.primary{background:linear-gradient(135deg,#0ea5e9,#2563eb);color:#fff;font-weight:800;}
.secondary{background:rgba(255,255,255,.12);color:#fff;font-weight:700;}

.list{display:grid;gap:10px;margin-top:14px;}

.item{
background:rgba(255,255,255,.05);
padding:12px;
border-radius:14px;
position:relative;
}

.item.ingreso::before,
.item.gasto::before{
content:"";
position:absolute;
left:0;top:0;bottom:0;width:4px;
}

.item.ingreso::before{background:#22c55e;}
.item.gasto::before{background:#ef4444;}

.title{font-weight:700;font-size:14px;}
.price{font-weight:800;margin-top:4px;}

.delete{
margin-top:8px;
background:rgba(239,68,68,.15);
color:#fff;
padding:8px;
border-radius:10px;
font-size:12px;
}

#dashboard{display:none;}

canvas{
background:rgba(255,255,255,.03);
border-radius:16px;
padding:10px;
margin-top:14px;
}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
padding:12px 16px;
border-radius:12px;
font-weight:700;
z-index:9999;
}

@media(min-width:700px){
.top{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>

<body>

<div id="app">

<h1>🏦 Banking PRO</h1>
<div class="sub">control financiero inteligente</div>

<button class="secondary" onclick="irDashboard()" style="margin-bottom:12px;">
📊 Abrir Dashboard
</button>

<div class="top">

<div class="card">
<span>💸 Gastos de hoy</span>
<strong id="hoy">$0</strong>
</div>

<div class="card">
<span>📊 Registros</span>
<strong id="registros">0</strong>
</div>

<div class="card">
<span>⚖️ Balance</span>
<strong id="balance">$0</strong>
</div>

</div>

<div class="panel">

<form id="formulario">

<input type="date" id="fecha" required>
<input type="text" id="descripcion" placeholder="Descripción" required>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
<input type="number" id="monto" placeholder="Monto" required>

<select id="categoria">
<option>💰 Ingreso</option>
<option>🍔 Comida</option>
<option>🏠 Vivienda</option>
<option>🚗 Transporte</option>
<option>💡 Servicios</option>
<option>🎮 Entretenimiento</option>
</select>
</div>

<button class="primary" type="submit">Guardar movimiento</button>

</form>

<div class="list" id="lista"></div>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<button class="secondary" onclick="irApp()" style="margin-bottom:10px;">⬅ Volver</button>

<div class="top">

<div class="card">
<span>💰 Ingresos</span>
<strong id="ingresos">$0</strong>
</div>

<div class="card">
<span>💸 Gastos</span>
<strong id="gastos">$0</strong>
</div>

<div class="card">
<span>⚖️ Balance</span>
<strong id="balance2">$0</strong>
</div>

</div>

<canvas id="chartPie"></canvas>
<canvas id="chartBar"></canvas>

</div>

<script>

const URL="https://script.google.com/macros/s/AKfycbwXGhRN-TJxXf4hvwk_BFV52Javiqn6Lzz5ps6M1yTz9PJy-9kDcsUKJLzUY-mTS1Z2/exec";

let data=[];

/* NAV */
function irDashboard(){
document.getElementById("app").style.display="none";
document.getElementById("dashboard").style.display="block";
load();
}

function irApp(){
document.getElementById("dashboard").style.display="none";
document.getElementById("app").style.display="block";
}

/* TOAST */
function toast(msg,color="#22c55e"){
let t=document.createElement("div");
t.className="toast";
t.innerText=msg;
t.style.background=color;
document.body.appendChild(t);
setTimeout(()=>t.remove(),2000);
}

/* LOAD */
async function load(){
let r=await fetch(URL);
data=await r.json();
render();
dashboard();
}

/* RENDER LIST */
function render(){

document.getElementById("registros").innerText=data.length;

let lista=document.getElementById("lista");
lista.innerHTML="";

let hoy=new Date().toISOString().split("T")[0];
let gastosHoy=0;
let ingresos=0,gastos=0;

data.forEach(x=>{

if(x.Tipo==="Ingreso") ingresos+=+x.Monto;
else gastos+=+x.Monto;

if(x.Fecha===hoy && x.Tipo==="Gasto"){
gastosHoy+=+x.Monto;
}

});

document.getElementById("hoy").innerText="$"+gastosHoy.toLocaleString();
document.getElementById("balance").innerText="$"+(ingresos-gastos).toLocaleString();

data.slice().reverse().forEach(x=>{

let tipo=x.Tipo==="Ingreso"?"ingreso":"gasto";

lista.innerHTML+=`
<div class="item ${tipo}">
<div class="title">${x.Categoría} - ${x.Descripción}</div>
<div class="price">$${(+x.Monto).toLocaleString()}</div>

<button class="delete" onclick="borrar('${x.ID}')">🗑️ eliminar</button>
</div>
`;
});
}

/* DASHBOARD PRO */
function dashboard(){

let ingresos=0,gastos=0;
let cat={};

data.forEach(x=>{
if(x.Tipo==="Ingreso") ingresos+=+x.Monto;
else gastos+=+x.Monto;

cat[x.Categoría]=(cat[x.Categoría]||0)+(+x.Monto);
});

document.getElementById("ingresos").innerText="$"+ingresos.toLocaleString();
document.getElementById("gastos").innerText="$"+gastos.toLocaleString();
document.getElementById("balance2").innerText="$"+(ingresos-gastos).toLocaleString();

/* PIE */
new Chart(document.getElementById("chartPie"),{
type:"doughnut",
data:{
labels:Object.keys(cat),
datasets:[{data:Object.values(cat)}]
}
});

/* BAR */
new Chart(document.getElementById("chartBar"),{
type:"bar",
data:{
labels:["Ingresos","Gastos"],
datasets:[{
data:[ingresos,gastos]
}]
}
});
}

/* SAVE */
document.getElementById("formulario").addEventListener("submit",async e=>{
e.preventDefault();

let r=await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify({
Fecha:fecha.value,
Categoría:categoria.value,
Descripción:descripcion.value,
Monto:monto.value,
Tipo:categoria.value.includes("Ingreso")?"Ingreso":"Gasto"
})
});

let res=await r.json();

if(res.status==="ok") toast("Guardado ✔️");
else toast("Error","#ef4444");

load();

formulario.reset();
});

/* DELETE */
async function borrar(id){

if(!confirm("Eliminar movimiento?")) return;

let r=await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify({action:"delete",ID:id})
});

let res=await r.json();

if(res.status==="deleted") toast("Eliminado ✔️","#ef4444");

load();
}

/* INIT */
let fecha=document.getElementById("fecha");
let descripcion=document.getElementById("descripcion");
let monto=document.getElementById("monto");
let categoria=document.getElementById("categoria");

fecha.valueAsDate=new Date();
load();

</script>

</body>
</html>
