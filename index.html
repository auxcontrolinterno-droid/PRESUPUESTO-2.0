  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, getDoc, deleteDoc, doc, updateDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyABzhwIZkis5OykXxDHXVKCaP0k1qKTZcY",
      authDomain: "banking-pro-8c1a3.firebaseapp.com",
      projectId: "banking-pro-8c1a3",
      storageBucket: "banking-pro-8c1a3.firebasestorage.app",
      messagingSenderId: "480815819152",
      appId: "1:480815819152:web:80a270dc86504fee1dab15"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    window.db = db; window.auth = auth;
    window.fbCollection = collection; window.fbAddDoc = addDoc;
    window.fbGetDocs = getDocs; window.fbGetDoc = getDoc;
    window.fbDeleteDoc = deleteDoc; window.fbDoc = doc;
    window.fbUpdateDoc = updateDoc; window.fbQuery = query;
    window.fbWhere = where; window.fbOnSnapshot = onSnapshot;
    window.fbRegister = (e,p) => createUserWithEmailAndPassword(auth,e,p);
    window.fbLogin = (e,p) => signInWithEmailAndPassword(auth,e,p);
    window.fbLogout = () => signOut(auth);
    window.fbUpdateProfile = (u,d) => updateProfile(u,d);

    onAuthStateChanged(auth, (user) => {
      window.currentUser = user;
      if (typeof window.onUserChanged === 'function') window.onUserChanged(user);
    });

    window.firebaseReady = true;
  </script>

  <style>
    :root {
      --bg1:#0a0f1a; --bg2:#111827; --card:rgba(255,255,255,.05);
      --line:rgba(255,255,255,.08); --text:#f1f5f9; --muted:#94a3b8;
      --input:#1e293b; --inputText:#f1f5f9; --primary:#3b82f6; --primary2:#2563eb;
      --ok:#22c55e; --bad:#ef4444; --warn:#f59e0b; --transfer:#a78bfa;
      --accent:#8b5cf6; --accent2:#7c3aed;
    }
    
    body {
      --bg1:#0a0f1a; --bg2:#111827; --card:rgba(255,255,255,.05);
      --line:rgba(255,255,255,.08); --text:#f1f5f9; --muted:#94a3b8;
      --input:#1e293b; --inputText:#f1f5f9; --primary:#3b82f6; --primary2:#2563eb;
      --ok:#22c55e; --bad:#ef4444; --warn:#f59e0b; --transfer:#a78bfa;
      --accent:#8b5cf6; --accent2:#7c3aed;
    }
    
    body.tema-light {
      --bg1:#f8fafc; --bg2:#ffffff; --card:#ffffff; --line:#e2e8f0;
      --text:#0f172a; --muted:#64748b; --input:#f1f5f9; --inputText:#0f172a;
      --primary:#3b82f6; --primary2:#2563eb; --ok:#22c55e; --bad:#ef4444; --warn:#f59e0b;
      --transfer:#a78bfa; --accent:#8b5cf6; --accent2:#7c3aed;
      background: linear-gradient(180deg, #f8fafc, #ffffff) !important;
    }
    body.tema-light .card, body.tema-light .header { background: #ffffff; border: 1px solid #e2e8f0; }
    body.tema-light .kpi { background: #f8fafc; }
    body.tema-light .nav { background: rgba(255,255,255,0.95); border-top: 1px solid #e2e8f0; }
    body.tema-light input, body.tema-light select { background: #f1f5f9; color: #0f172a; border: 1px solid #cbd5e1; }
    body.tema-light .item { background: #f8fafc; }
    body.tema-light .cuenta-card { background: #f8fafc; }
    
    body.tema-ocean { --bg1:#0c1929; --bg2:#122738; --card:rgba(6,182,212,.08); --line:rgba(6,182,212,.15); --text:#e0f7fa; --muted:#80deea; --input:#0d2137; --inputText:#e0f7fa; --primary:#06b6d4; --primary2:#0891b2; --ok:#10b981; --bad:#ef4444; --warn:#f59e0b; background: linear-gradient(180deg, #0c1929, #122738) !important; }
    body.tema-forest { --bg1:#0d1f0d; --bg2:#152815; --card:rgba(34,197,94,.08); --line:rgba(34,197,94,.15); --text:#dcfce7; --muted:#86efac; --input:#1a2e1a; --inputText:#dcfce7; --primary:#22c55e; --primary2:#16a34a; --ok:#22c55e; --bad:#ef4444; --warn:#f59e0b; background: linear-gradient(180deg, #0d1f0d, #152815) !important; }
    body.tema-sunset { --bg1:#1a0d0d; --bg2:#281515; --card:rgba(245,158,11,.08); --line:rgba(245,158,11,.15); --text:#fef3c7; --muted:#fcd34d; --input:#2e1a1a; --inputText:#fef3c7; --primary:#f59e0b; --primary2:#d97706; --ok:#22c55e; --bad:#ef4444; --warn:#f59e0b; background: linear-gradient(180deg, #1a0d0d, #281515) !important; }
    body.tema-purple { --bg1:#1a0d2e; --bg2:#2d1b4e; --card:rgba(139,92,246,.08); --line:rgba(139,92,246,.15); --text:#ede9fe; --muted:#c4b5fd; --input:#2d1b4e; --inputText:#ede9fe; --primary:#8b5cf6; --primary2:#7c3aed; --ok:#10b981; --bad:#ef4444; --warn:#f59e0b; background: linear-gradient(180deg, #1a0d2e, #2d1b4e) !important; }
    body.tema-rose { --bg1:#1a0d14; --bg2:#2d1523; --card:rgba(236,72,153,.08); --line:rgba(236,72,153,.15); --text:#fce7f3; --muted:#f9a8d4; --input:#2d1523; --inputText:#fce7f3; --primary:#ec4899; --primary2:#db2777; --ok:#10b981; --bad:#ef4444; --warn:#f59e0b; background: linear-gradient(180deg, #1a0d14, #2d1523) !important; }
    body.tema-cyber { --bg1:#001a1a; --bg2:#002626; --card:rgba(0,255,135,.08); --line:rgba(0,255,135,.15); --text:#e0ffe0; --muted:#66ff66; --input:#002626; --inputText:#e0ffe0; --primary:#00ff87; --primary2:#00cc6a; --ok:#00ff87; --bad:#ff4444; --warn:#ffaa00; background: linear-gradient(180deg, #001a1a, #002626) !important; }
    
    body.modo-negocio { --primary:#f59e0b; --primary2:#d97706; }
    body.modo-pareja { --primary:#ec4899; --primary2:#db2777; }
    
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:Inter,sans-serif;color:var(--text);padding:14px 14px 100px;max-width:820px;margin:auto;min-height:100vh;transition:background .5s,color .3s;}
    .card,.header{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:14px;margin-bottom:10px;backdrop-filter:blur(10px);}
    .big{font-size:32px;font-weight:800}
    .small{font-size:11px;color:var(--muted)}
    .title{font-size:16px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
    .kpi{background:rgba(255,255,255,.03);padding:10px;border-radius:12px;text-align:center}
    .kpi span{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}
    .kpi strong{font-size:16px;font-weight:800}
    input,select,button{width:100%;border:none;outline:none;border-radius:12px;font-family:inherit;font-size:14px}
    input,select{padding:12px;background:var(--input);color:var(--inputText);font-weight:500;margin-bottom:8px}
    button{padding:12px;font-weight:700;cursor:pointer;transition:all .2s}
    .primary{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff}
    .secondary{background:rgba(255,255,255,.06);color:var(--text)}
    .danger{background:rgba(239,68,68,.15);color:var(--bad)}
    .small-btn{padding:6px 10px;font-size:11px;width:auto;background:rgba(255,255,255,.06);color:var(--text);border-radius:8px}
    .warn-btn{background:rgba(245,158,11,.15);color:var(--warn);padding:6px 10px;font-size:11px;width:auto;border-radius:8px}
    .success-btn{background:rgba(34,197,94,.15);color:var(--ok);padding:6px 10px;font-size:11px;width:auto;border-radius:8px}
    .voice-btn{background:linear-gradient(135deg,var(--accent,#8b5cf6),var(--accent2,#6366f1));color:#fff;padding:12px;font-weight:700;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;margin-top:6px}
    .voice-btn.listening{background:#ef4444;animation:pulse .8s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
    .voice-feedback{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:12px;padding:10px;margin-top:6px;font-size:12px;display:none}
    .voice-feedback.active{display:block}
    
    .progreso-nivel{height:8px;background:rgba(255,255,255,.08);border-radius:10px;overflow:hidden;margin-top:4px}
    .progreso-nivel-fill{height:100%;background:linear-gradient(90deg,#f59e0b,#ffd700);transition:width .3s}
    .tabs-mini{display:flex;gap:4px;margin-bottom:8px}
    .tab-mini{flex:1;padding:6px;text-align:center;font-size:11px;font-weight:600;background:rgba(255,255,255,.04);border-radius:8px;cursor:pointer}
    .tab-mini.active{background:rgba(59,130,246,.15);color:var(--primary)}
    .tema-preview{width:100%;height:60px;border-radius:12px;cursor:pointer;border:2px solid transparent;transition:.2s;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
    .tema-preview:hover{transform:scale(1.03)}
    .tema-preview.activo{border-color:#fff;box-shadow:0 0 15px rgba(255,255,255,.3)}

    #loginScreen{display:flex;position:fixed;inset:0;z-index:2000;background:linear-gradient(135deg,#0a0f1a,#111827);align-items:center;justify-content:center;padding:20px}
    #loginScreen.oculto{display:none}
    .login-box{width:100%;max-width:380px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:28px 24px}
    .login-logo{text-align:center;margin-bottom:24px}
    .login-logo span{font-size:42px;display:block;margin-bottom:6px}
    .login-logo h1{font-size:20px;font-weight:800;color:#fff}
    .login-logo p{font-size:12px;color:#64748b;margin-top:4px}
    .login-tabs{display:grid;grid-template-columns:1fr 1fr;gap:4px;background:rgba(255,255,255,.04);border-radius:12px;padding:4px;margin-bottom:16px}
    .login-tab{padding:10px;text-align:center;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;color:#64748b;border:none;background:transparent;width:100%}
    .login-tab.active{background:rgba(59,130,246,.25);color:#fff}
    .login-input-wrap{margin-bottom:10px}
    .login-input-wrap label{display:block;font-size:10px;font-weight:700;color:#64748b;margin-bottom:5px}
    .login-input-wrap input{padding:12px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-size:13px;width:100%}
    .login-btn-main{width:100%;padding:13px;border-radius:12px;font-size:14px;font-weight:800;border:none;background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;margin-top:4px}
    .login-error{background:rgba(239,68,68,.12);color:#ef4444;border-radius:10px;padding:8px 10px;font-size:12px;font-weight:600;margin-bottom:10px;display:none}
    .login-error.visible{display:block}
    #appContent{display:none}
    #appContent.visible{display:block}
    .ctx-wrap{display:flex;gap:5px;margin-bottom:8px}
    .ctx-btn{flex:1;padding:8px 4px;font-size:12px;font-weight:700;border-radius:10px;cursor:pointer;text-align:center;border:1px solid transparent;background:rgba(255,255,255,.04);color:var(--muted);transition:.2s}
    .ctx-btn.ctx-active{background:rgba(59,130,246,.15);color:var(--primary);border-color:var(--primary)}
    .ctx-btn.ctx-biz.ctx-active{background:rgba(245,158,11,.15);color:#f59e0b;border-color:#f59e0b}
    .ctx-btn.ctx-pareja.ctx-active{background:rgba(236,72,153,.15);color:#ec4899;border-color:#ec4899}
    .ctx-label{display:inline-block;padding:2px 7px;border-radius:14px;font-size:10px;font-weight:700;margin-left:4px}
    .ctx-label.personal{background:rgba(59,130,246,.15);color:var(--primary)}
    .ctx-label.negocio{background:rgba(245,158,11,.15);color:#f59e0b}
    .ctx-label.pareja{background:rgba(236,72,153,.15);color:#ec4899}
    .mode-tabs{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;margin-bottom:10px}
    .mode-tab{padding:8px 4px;font-size:11px;font-weight:700;background:rgba(255,255,255,.04);color:var(--muted);border-radius:10px;cursor:pointer;border:1px solid transparent;text-align:center;transition:.2s}
    .mode-tab.active{background:rgba(59,130,246,.15);color:var(--primary);border-color:var(--primary)}
    .form-section{display:none}
    .form-section.active{display:block}
    .cuenta-card{display:flex;align-items:center;justify-content:space-between;padding:10px;background:rgba(255,255,255,.02);border-radius:12px;margin-bottom:6px}
    .cuenta-left{display:flex;align-items:center;gap:8px}
    .cuenta-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;background:rgba(255,255,255,.06)}
    .cuenta-name{font-weight:600;font-size:13px}
    .cuenta-saldo{font-weight:700;font-size:15px}
    .cuenta-saldo.positive{color:var(--ok)}.cuenta-saldo.negative{color:var(--bad)}
    .dist-bar{height:6px;border-radius:10px;background:rgba(255,255,255,.05);overflow:hidden;display:flex;margin-top:8px}
    .dist-seg{height:100%;transition:width .3s}
    .dist-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
    .dist-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
    .dist-dot{width:6px;height:6px;border-radius:50%}
    .tab{display:none}.tab.active{display:block}
    .list{display:flex;flex-direction:column;gap:6px}
    .item{background:rgba(255,255,255,.02);padding:10px;border-radius:12px;border-left:3px solid transparent}
    .ingreso{border-left-color:var(--ok)}.gasto{border-left-color:var(--bad)}
    .transferencia{border-left-color:var(--transfer)}.traspaso{border-left-color:#ec4899}
    .prestamo{border-left-color:#06b6d4}.suscripcion{border-left-color:#8b5cf6}
    .alert{padding:8px;border-radius:10px;font-size:12px;margin-top:6px;line-height:1.4}
    .good{background:rgba(34,197,94,.1);color:var(--ok)}
    .bad{background:rgba(239,68,68,.1);color:var(--bad)}
    .mid{background:rgba(245,158,11,.1);color:var(--warn)}
    .info{background:rgba(59,130,246,.1);color:var(--primary)}
    .progress{height:8px;background:rgba(255,255,255,.06);border-radius:10px;overflow:hidden;margin-top:6px}
    .bar{height:100%;background:linear-gradient(90deg,#22c55e,#4ade80);width:0%;transition:width .3s}
    .nav{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(6,1fr);gap:4px;padding:8px 10px;background:rgba(10,15,26,.95);backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,.06);max-width:820px;margin:auto;z-index:100}
    .nav button{padding:6px 2px;font-size:18px;background:transparent;color:#64748b;border-radius:10px;transition:.2s}
    .nav button.active{background:rgba(255,255,255,.08);color:#fff}
    .toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 14px;border-radius:12px;font-size:12px;font-weight:700;display:none;z-index:999;white-space:nowrap;max-width:85vw;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.5)}
    .filter-chips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
    .filter-chip{padding:4px 10px;border-radius:14px;font-size:11px;font-weight:600;background:rgba(255,255,255,.04);color:var(--muted);cursor:pointer}
    .filter-chip.active{background:rgba(59,130,246,.15);color:var(--primary)}
    .user-chip{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:4px 8px 4px 4px;cursor:pointer}
    .user-chip-avatar{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff}
    .user-chip-name{font-size:11px;font-weight:600;max-width:80px;overflow:hidden}
    canvas{margin-top:8px;background:rgba(255,255,255,.02);padding:6px;border-radius:12px}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;padding:20px}
    .modal-overlay.open{display:flex}
    .modal{background:#111827;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:20px;max-width:400px;width:100%;max-height:85vh;overflow-y:auto}
    .modal h3{font-size:16px;font-weight:800;margin-bottom:8px}
    .modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
    .notification-settings{background:rgba(255,255,255,.03);border-radius:14px;padding:10px;margin-top:8px}
    .notification-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
    .notification-row:last-child{border-bottom:none}
    .toggle-switch{position:relative;width:44px;height:24px;display:inline-block}
    .toggle-switch input{opacity:0;width:0;height:0;margin:0}
    .toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.1);transition:.3s;border-radius:24px}
    .toggle-slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:#fff;transition:.3s;border-radius:50%}
    input:checked+.toggle-slider{background:linear-gradient(135deg,#3b82f6,#7c3aed)}
    input:checked+.toggle-slider:before{transform:translateX(20px)}
    .cat-chip{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:14px;padding:4px 8px;font-size:11px;margin:2px}
    .cat-chip button{width:auto;padding:0 3px;background:transparent;color:var(--bad);font-size:12px}
    .color-preset{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.2s;display:inline-block}
    .color-preset:hover{transform:scale(1.2);border-color:#fff}
    .color-preset.selected{border-color:#fff;box-shadow:0 0 10px rgba(255,255,255,.5)}
    .prestamo-card{background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.15);border-radius:14px;padding:12px;margin-bottom:8px}
    .suscripcion-card{background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.15);border-radius:14px;padding:12px;margin-bottom:8px}
    .tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;margin:2px}
    .tag-suscripcion{background:rgba(139,92,246,.15);color:#a78bfa}
    .tag-prestamo{background:rgba(6,182,212,.15);color:#06b6d4}
    .tag-regla{background:rgba(245,158,11,.15);color:var(--warn)}
    .tag-recordatorio{background:rgba(239,68,68,.15);color:var(--bad)}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo"><span>💳</span><h1>Banking PRO AI</h1><p>Tu gestor financiero inteligente</p></div>
    <div class="login-tabs">
      <button class="login-tab active" id="tabLoginBtn">Iniciar sesión</button>
      <button class="login-tab" id="tabRegisterBtn">Registrarse</button>
    </div>
    <div id="loginError" class="login-error"></div>
    <div id="formLogin">
      <div class="login-input-wrap"><label>Correo</label><input type="email" id="loginEmail" placeholder="tu@correo.com"></div>
      <div class="login-input-wrap"><label>Contraseña</label><input type="password" id="loginPass" placeholder="••••••••"></div>
      <button class="login-btn-main" id="loginBtn">Entrar →</button>
    </div>
    <div id="formRegister" style="display:none">
      <div class="login-input-wrap"><label>Nombre</label><input type="text" id="regName" placeholder="Tu nombre"></div>
      <div class="login-input-wrap"><label>Correo</label><input type="email" id="regEmail" placeholder="tu@correo.com"></div>
      <div class="login-input-wrap"><label>Contraseña (mín. 6)</label><input type="password" id="regPass" placeholder="••••••••"></div>
      <button class="login-btn-main" id="registerBtn">Crear cuenta →</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="appContent">
  <div class="header">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div><div class="small">Banking PRO AI v28 <span style="color:var(--ok)">●</span></div><div class="small" id="today"></div></div>
      <div class="user-chip" onclick="goTab('settings',5)">
        <div class="user-chip-avatar" id="userAvatar">?</div>
        <div class="user-chip-name" id="userName">—</div>
      </div>
    </div>
    <div class="ctx-wrap">
      <div class="ctx-btn ctx-active" id="ctxPersonal" onclick="setContexto('personal')">👤 Personal</div>
      <div class="ctx-btn ctx-biz" id="ctxNegocio" onclick="setContexto('negocio')">🏪 Negocio</div>
      <div class="ctx-btn ctx-pareja" id="ctxPareja" onclick="setContexto('pareja')">💑 Pareja</div>
    </div>
    <div class="small" style="margin-top:2px" id="ctxSaldoLabel">Saldo total disponible</div>
    <div class="big" id="saldoTop">$0</div>
    <div style="font-size:11px;margin-top:6px;cursor:pointer;color:var(--muted)" onclick="toggleHide()">👁 Mostrar / ocultar</div>
    
    <div class="grid3" style="margin-top:10px">
      <div class="kpi"><span>Movimientos</span><strong id="syncCount">0</strong></div>
      <div class="kpi"><span>Préstamos</span><strong id="prestamosCount">0</strong></div>
      <div class="kpi"><span>Suscripciones</span><strong id="suscripcionesCount">0</strong></div>
    </div>
  </div>

  <!-- HOME -->
  <section class="tab active" id="tab-home">
    <div class="card">
      <div class="title">➕ Registrar <span class="ctx-label personal" id="movCtxLabel">Personal</span></div>
      <div class="mode-tabs">
        <div class="mode-tab active" onclick="setMode('ingreso',this)">💰 Ingreso</div>
        <div class="mode-tab" onclick="setMode('gasto',this)">💸 Gasto</div>
        <div class="mode-tab" onclick="setMode('transferencia',this)">🔄 Mover</div>
        <div class="mode-tab" onclick="setMode('traspaso',this)">🔀 Traspaso</div>
      </div>
      <input type="date" id="fecha">
      <div class="form-section active" id="fs-normal">
        <label>Cuenta</label><select id="cuentaSel"></select>
        <label>Categoría</label><select id="categoria"></select>
        <input type="text" id="descripcion" placeholder="Descripción">
        <input type="text" id="montoInput" placeholder="Monto ej: 20.000">
        <input type="text" id="notaInput" placeholder="Nota (opcional)">
      </div>
      <div class="form-section" id="fs-transfer">
        <label>Cuenta origen</label><select id="cuentaOrigen"></select>
        <div style="text-align:center;margin:2px 0">⬇️</div>
        <label>Cuenta destino</label><select id="cuentaDestino"></select>
        <input type="text" id="montoTransfer" placeholder="Monto ej: 50.000">
        <input type="text" id="descTransfer" placeholder="Descripción">
      </div>
      <div class="form-section" id="fs-traspaso">
        <div class="alert info" style="margin-bottom:8px">Mueve dinero entre Personal ↔ Negocio</div>
        <label>Dirección</label><select id
