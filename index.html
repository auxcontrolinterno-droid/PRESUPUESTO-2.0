<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Banking PRO AI v9 - Fase 2</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg1:#070b16;
--bg2:#0b1020;
--card:rgba(255,255,255,.06);
--line:rgba(255,255,255,.08);
--text:#fff;
--muted:#94a3b8;
--input:#fff;
--inputText:#111;
--primary:#2563eb;
--primary2:#1d4ed8;
}

body.light{
--bg1:#eef2ff;
--bg2:#f8fafc;
--card:#fff;
--line:#e2e8f0;
--text:#0f172a;
--muted:#64748b;
--input:#fff;
--inputText:#111827;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
font-family:Inter,sans-serif;
background:linear-gradient(180deg,var(--bg1),var(--bg2));
color:var(--text);
padding:14px 14px 96px;
max-width:780px;
margin:auto;
}

.header,.card{
background:var(--card);
border:1px solid var(--line);
border-radius:22px;
padding:16px;
margin-bottom:12px;
backdrop-filter:blur(14px);
}

.big{font-size:32px;font-weight:800}
.small{font-size:12px;color:var(--muted)}
.title{font-size:17px;font-weight:800;margin-bottom:10px}

.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.kpi{
background:rgba(255,255,255,.04);
padding:12px;
border-radius:14px;
}

.kpi span{
display:block;
font-size:12px;
color:var(--muted);
margin-bottom:4px;
}

.kpi strong{font-size:18px}

input,select,button{
width:100%;
border:none;
outline:none;
border-radius:14px;
font-family:inherit;
}

input,select{
padding:14px;
background:var(--input);
color:var(--inputText);
font-weight:600;
margin-bottom:10px;
}

button{
padding:14px;
font-weight:800;
cursor:pointer;
}

.primary{
background:linear-gradient(135deg,var(--primary),var(--primary2));
color:#fff;
}

.secondary{
background:rgba(255,255,255,.08);
color:var(--text);
}

.tab{display:none}
.tab.active{display:block}

.list{
display:grid;
gap:10px;
}

.item{
background:rgba(255,255,255,.04);
padding:12px;
border-radius:14px;
border-left:4px solid transparent;
}

.ingreso{border-left-color:#22c55e}
.gasto{border-left-color:#ef4444}

.price{font-weight:800;margin-top:6px}

.small-btn{
padding:8px 10px;
font-size:12px;
margin-top:8px;
width:auto;
background:rgba(255,255,255,.08);
color:var(--text);
}

.alert{
padding:10px;
border-radius:12px;
font-size:13px;
margin-top:8px;
line-height:1.4;
}

.good{background:rgba(34,197,94,.14);color:#22c55e}
.mid{background:rgba(245,158,11,.14);color:#f59e0b}
.bad{background:rgba(239,68,68,.14);color:#ef4444}

.progress{
height:10px;
background:rgba(255,255,255,.08);
border-radius:20px;
overflow:hidden;
margin-top:8px;
}

.bar{
height:100%;
background:linear-gradient(90deg,#22c55e,#84cc16);
width:0%;
transition:.35s;
}

.nav{
position:fixed;
left:0;right:0;bottom:0;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
padding:10px 12px calc(10px + env(safe-area-inset-bottom));
background:rgba(8,12,22,.92);
backdrop-filter:blur(16px);
border-top:1px solid var(--line);
max-width:780px;
margin:auto;
}

.nav button{
padding:10px 6px;
font-size:11px;
background:transparent;
color:#cbd5e1;
}

.nav button.active{
background:rgba(255,255,255,.08);
color:#fff;
border-radius:12px;
}

canvas{
margin-top:10px;
background:rgba(255,255,255,.03);
border-radius:14px;
padding:8px;
}

.toast{
position:fixed;
left:50%;
bottom:88px;
transform:translateX(-50%);
background:#111827;
color:#fff;
padding:12px 16px;
border-radius:14px;
font-size:13px;
font-weight:700;
display:none;
z-index:999;
}

.lock{
position:fixed;
inset:0;
background:#020617;
display:flex;
align-items:center;
justify-content:center;
padding:18px;
z-index:5000;
}

.lock-box{
width:100%;
max-width:360px;
background:#111827;
padding:22px;
border-radius:22px;
}

.lock-box h2{
font-size:22px;
margin-bottom:12px;
}

.eye{
font-size:12px;
color:var(--muted);
margin-top:10px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- PIN LOCK -->
<div class="lock" id="lockScreen" style="display:none">
<div class="lock-box">
<h2>🔐 Banking PRO AI</h2>
<div class="small" style="margin-bottom:10px">Ingresa tu PIN</div>
<input type="password" id="pinInput" maxlength="4" placeholder="****">
<button class="primary" onclick="unlock()">Entrar</button>
<button class="secondary" style="margin-top:10px" onclick="resetPin()">Olvidé PIN</button>
</div>
</div>

<!-- HEADER -->
<div class="header">
<div class="small" id="hello"></div>
<div class="small" id="today"></div>

<div class="small" style="margin-top:10px">Saldo disponible</div>
<div class="big" id="saldoTop">$0</div>

<div class="eye" onclick="toggleHide()">👁 Mostrar / ocultar montos</div>

<div class="grid2" style="margin-top:12px">
<div class="kpi"><span>Pendientes</span><strong id="pendingCount">0</strong></div>
<div class="kpi"><span>Sincronizados</span><strong id="syncCount">0</strong></div>
</div>
</div>

<!-- HOME -->
<section class="tab active" id="tab-home">

<div class="card">
<div class="title">➕ Nuevo movimiento</div>

<input type="date" id="fecha">
<input type="text" id="descripcion" placeholder="Descripción">
<input type="text" id="monto" placeholder="Monto 4.000">

<select id="categoria">
<option>💰 Ingreso</option>
<option>🍔 Comida</option>
<option>🏠 Vivienda</option>
<option>🚗 Transporte</option>
<option>💡 Servicios</option>
<option>🎮 Entretenimiento</option>
<option>🏦 Ahorro</option>
</select>

<button class="primary" id="saveBtn" onclick="guardar()">💾 Guardar</button>
</div>

<div class="card">
<div class="title">🔔 Alertas</div>
<div id="alerts"></div>
</div>

</section>

<!-- DASH -->
<section class="tab" id="tab-dashboard">

<div class="card">
<div class="title">📊 Categorías</div>
<canvas id="chart1"></canvas>
</div>

<div class="card">
<div class="title">📈 Ingreso vs Gasto</div>
<canvas id="chart2"></canvas>
</div>

</section>

<!-- GOALS -->
<section class="tab" id="tab-goals">

<div class="card">
<div class="title">🎯 Nueva meta</div>

<input type="text" id="goalName" placeholder="Ej: Viaje">
<input type="number" id="goalValue" placeholder="Monto meta">

<button class="primary" onclick="addGoal()">Guardar meta</button>
</div>

<div class="card">
<div class="title">🚀 Metas inteligentes</div>
<div id="goalList"></div>
</div>

</section>

<!-- LIST -->
<section class="tab" id="tab-list">

<div class="card">
<div class="title">📋 Movimientos</div>
<div class="list" id="lista"></div>
</div>

</section>

<!-- SETTINGS -->
<section class="tab" id="tab-settings">

<div class="card">
<div class="title">⚙️ Ajustes</div>

<button class="secondary" onclick="setTheme('dark')">🌙 Tema oscuro</button>
<br><br>
<button class="secondary" onclick="setTheme('light')">☀️ Tema claro</button>
<br><br>
<button class="secondary" onclick="createPin()">🔐 Crear / cambiar PIN</button>
<br><br>
<button class="secondary" onclick="lockNow()">🔒 Bloquear ahora</button>

</div>

</section>

<nav class="nav">
<button class="active" onclick="goTab('home',this)">🏠</button>
<button onclick="goTab('dashboard',this)">📊</button>
<button onclick="goTab('goals',this)">🎯</button>
<button onclick="goTab('list',this)">📋</button>
<button onclick="goTab('settings',this)">⚙️</button>
</nav>

<div class="toast" id="toast"></div>

<script>
const URL="https://script.google.com/macros/s/AKfycbwXGhRN-TJxXf4hvwk_BFV52Javiqn6Lzz5ps6M1yTz9PJy-9kDcsUKJLzUY-mTS1Z2/exec";

let data=[];
let goals=JSON.parse(localStorage.getItem("goals")||"[]");
let pending=JSON.parse(localStorage.getItem("pendingQueue")||"[]");
let hidden=localStorage.getItem("hideMoney")==="1";

let c1,c2;

fecha.valueAsDate=new Date();

init();
load();

/* INIT */
function init(){

const h=new Date().getHours();

hello.innerText=
h<12?"Buenos días ☀️":
h<19?"Buenas tardes 🌤️":
"Buenas noches 🌙";

today.innerText=new Date().toLocaleDateString("es-CO",{
weekday:"long",day:"numeric",month:"long"
});

pendingCount.innerText=pending.length;

const th=localStorage.getItem("theme")||"dark";
setTheme(th,false);

if(localStorage.getItem("pinCode")){
lockScreen.style.display="flex";
}
}

/* TOAST */
function toast(msg){
toastEl.innerText=msg;
toastEl.style.display="block";
setTimeout(()=>toastEl.style.display="none",2200);
}
const toastEl=document.getElementById("toast");

/* PIN */
function createPin(){
let p=prompt("Crea PIN de 4 dígitos");
if(!p || p.length!==4) return;
localStorage.setItem("pinCode",p);
toast("PIN guardado");
}

function unlock(){
let p=pinInput.value;
if(p===localStorage.getItem("pinCode")){
lockScreen.style.display="none";
pinInput.value="";
}else{
toast("PIN incorrecto");
}
}

function resetPin(){
if(confirm("Eliminar PIN actual?")){
localStorage.removeItem("pinCode");
lockScreen.style.display="none";
toast("PIN eliminado");
}
}

function lockNow(){
if(localStorage.getItem("pinCode")){
lockScreen.style.display="flex";
}
}

/* TABS */
function goTab(tab,btn){
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
document.getElementById("tab-"+tab).classList.add("active");
document.querySelectorAll(".nav button").forEach(x=>x.classList.remove("active"));
btn.classList.add("active");
}

/* THEME */
function setTheme(mode,show=true){
document.body.classList.toggle("light",mode==="light");
localStorage.setItem("theme",mode);
if(show) toast("Tema actualizado");
}

/* HIDE MONEY */
function toggleHide(){
hidden=!hidden;
localStorage.setItem("hideMoney",hidden?"1":"0");
render();
}

function money(n){
if(hidden) return "••••••";
return "$"+Number(n).toLocaleString("es-CO");
}

/* LOAD */
async function load(){
try{
let r=await fetch(URL);
data=await r.json();
syncCount.innerText=data.length;
render();
}catch(e){
render();
}
}

/* SAVE */
async function guardar(){

let datos={
Fecha:fecha.value,
Categoría:categoria.value,
Descripción:descripcion.value.trim(),
Monto:Number(monto.value.replace(/\./g,"")),
Tipo:categoria.value.includes("Ingreso")?"Ingreso":"Gasto"
};

if(!datos.Descripción || datos.Monto<=0){
toast("Completa datos");
return;
}

saveBtn.disabled=true;
saveBtn.innerText="Guardando...";

try{
await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify(datos)
});

descripcion.value="";
monto.value="";
toast("Guardado");
await load();

}catch(e){
toast("Error");
}

saveBtn.disabled=false;
saveBtn.innerText="💾 Guardar";
}

/* DELETE */
async function borrar(id){

if(!confirm("Eliminar movimiento")) return;

data=data.filter(x=>String(x.ID)!==String(id));
render();

await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify({action:"delete",ID:id})
});

toast("Eliminado");
}

/* RENDER */
function render(){

lista.innerHTML="";

let ing=0,gas=0,ah=0;
let cats={};

data.slice().reverse().forEach(x=>{

let m=Number(x.Monto)||0;

if(x.Tipo==="Ingreso") ing+=m;
else gas+=m;

if(String(x.Categoría).includes("Ahorro")) ah+=m;

if(x.Tipo==="Gasto"){
cats[x.Categoría]=(cats[x.Categoría]||0)+m;
}

lista.innerHTML+=`
<div class="item ${x.Tipo==="Ingreso"?"ingreso":"gasto"}">
<div>${x.Categoría} - ${x.Descripción}</div>
<div class="price">${money(m)}</div>
<button class="small-btn" onclick="borrar('${x.ID}')">🗑️</button>
</div>`;
});

saldoTop.innerText=money(ing-gas);

renderAlerts(ing,gas,ah,cats);
renderGoals(ah);
charts(ing,gas,cats);
}

/* ALERTS */
function renderAlerts(ing,gas,ah,cats){

let html="";

html+=gas>ing
?'<div class="alert bad">🔴 Gastas más de lo que ingresas</div>'
:'<div class="alert good">🟢 Balance positivo</div>';

let top=Object.entries(cats).sort((a,b)=>b[1]-a[1])[0];

if(top){
html+=`<div class="alert mid">⚠️ Mayor gasto: ${top[0]}</div>`;
}

html+=`<div class="alert good">🏦 Ahorro actual ${money(ah)}</div>`;

alerts.innerHTML=html;
}

/* GOALS */
function addGoal(){

let n=goalName.value.trim();
let v=Number(goalValue.value);

if(!n || v<=0) return;

goals.push({n,v});
localStorage.setItem("goals",JSON.stringify(goals));

goalName.value="";
goalValue.value="";

render();
toast("Meta creada");
}

function renderGoals(ah){

goalList.innerHTML="";

goals.forEach((g,i)=>{

let p=Math.min((ah/g.v)*100,100);
let faltan=Math.max(g.v-ah,0);
let sem=Math.ceil(faltan/4);

goalList.innerHTML+=`
<div class="item">
<div><strong>${g.n}</strong></div>
<div class="small">${money(ah)} / ${money(g.v)}</div>
<div class="progress"><div class="bar" style="width:${p}%"></div></div>
<div class="small" style="margin-top:8px">
Faltan ${money(faltan)} · Meta estimada ${sem} semanas
</div>
<button class="small-btn" onclick="delGoal(${i})">🗑️</button>
</div>`;
});
}

function delGoal(i){
goals.splice(i,1);
localStorage.setItem("goals",JSON.stringify(goals));
render();
}

/* CHARTS */
function charts(ing,gas,cats){

[c1,c2].forEach(x=>x&&x.destroy());

c1=new Chart(chart1,{
type:"doughnut",
data:{
labels:Object.keys(cats),
datasets:[{data:Object.values(cats)}]
}
});

c2=new Chart(chart2,{
type:"bar",
data:{
labels:["Ingresos","Gastos"],
datasets:[{data:[ing,gas]}]
}
});
}
</script>

</body>
</html>
